<!DOCTYPE html>
<html>
<head>
    <title>Google Docs</title>
    <style>
        body { margin: 0; background: #87CEEB; font-family: sans-serif; text-align: center; overflow: hidden; }
        canvas { background: #aad; display: block; margin: 20px auto; border: 5px solid #fff; }
        .stats { font-size: 20px; color: #fff; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div class="stats">Level: <span id="lvl">1</span> | Training: <span id="xp">0</span>%</div>
    <canvas id="game"></canvas>
    <p>Click to Jump! Don't hit the obstacles!</p>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        canvas.width = 600; canvas.height = 300;

        let duck = { x: 50, y: 200, w: 40, h: 40, vy: 0, jump: -10 };
        let obstacles = [];
        let score = 0;
        let lvl = 1;

        function drawDuck() {
            ctx.fillStyle = "yellow";
            ctx.fillRect(duck.x, duck.y, duck.w, duck.h); // Body
            ctx.fillStyle = "orange";
            ctx.fillRect(duck.x + 30, duck.y + 10, 15, 10); // Beak
            ctx.fillStyle = "black";
            ctx.fillRect(duck.x + 25, duck.y + 5, 5, 5); // Eye
        }

        function update() {
            ctx.clearRect(0, 0, 600, 300);
            duck.vy += 0.6;
            duck.y += duck.vy;
            if (duck.y > 240) { duck.y = 240; duck.vy = 0; }

            if (Math.random() < 0.02) obstacles.push({ x: 600, y: 240, w: 20, h: 40 });

            obstacles.forEach((o, i) => {
                o.x -= (4 + lvl);
                ctx.fillStyle = "green";
                ctx.fillRect(o.x, o.y, o.w, o.h);

                // Collision
                if (duck.x < o.x + o.w && duck.x + duck.w > o.x && duck.y < o.y + o.h && duck.y + duck.h > o.y) {
                    location.reload();
                }
                if (o.x < -20) {
                    obstacles.splice(i, 1);
                    score++;
                    if (score % 10 == 0) { lvl++; document.getElementById('lvl').innerText = lvl; }
                    document.getElementById('xp').innerText = (score % 10) * 10;
                }
            });

            drawDuck();
            requestAnimationFrame(update);
        }

        window.onclick = () => { if (duck.y >= 240) duck.vy = duck.jump; };
        update();
    </script>
</body>
</html>
