<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Big NEON Tower | Project 404</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        
        #game-frame {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }

        .neon-spinner {
            width: 50px; height: 50px;
            border: 3px solid #1a1a1a;
            border-top: 3px solid #00ffcc; /* Neon Cyan */
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffcc;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="neon-spinner"></div>
        <p style="color: #00ffcc; font-family: 'Courier New', monospace; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px;">Powering Up...</p>
    </div>

    <iframe id="game-frame" src="https://v6p9d9t4.ssl.hwcdn.net/html/1453303/index.html" allow="autoplay; fullscreen; keyboard"></iframe>

    <script>
        const frame = document.getElementById('game-frame');
        const loader = document.getElementById('loading-overlay');

        // Remove loading screen once the internal game engine responds
        frame.onload = () => {
            loader.style.display = 'none';
            frame.focus();
        };

        // --- PROJECT 404 PANIC REDIRECT (Shift + 1) ---
        window.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === '1') {
                window.top.location.href = "https://classroom.google.com";
            }
        });

        // Ensure the game keeps keyboard focus
        window.addEventListener("mousedown", () => frame.focus());
    </script>
</body>
</html>
