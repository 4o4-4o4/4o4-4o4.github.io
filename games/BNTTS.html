<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Big NEON Tower vs Tiny Square</title>
    
    <script>
        window.sdk = {
            showBanner: function() { console.log("Ad Blocked: Banner"); },
            showInterstitial: function() { 
                console.log("Ad Blocked: Interstitial. Sending 'Ad Done' message.");
                // This triggers the game's internal 'ad finished' logic
                window.dispatchEvent(new CustomEvent('ad_done'));
                window.dispatchEvent(new CustomEvent('SDK_READY'));
            },
            init: function() { console.log("Fake SDK Initialized"); }
        };
        
        // Block the real SDK from loading by overwriting the script loader
        const originalCreateElement = document.createElement;
        document.createElement = function(tag) {
            const element = originalCreateElement.call(document, tag);
            if (tag.toLowerCase() === 'script') {
                Object.defineProperty(element, 'src', {
                    set: function(url) {
                        if (url.includes('gamemonetize.com') || url.includes('st39/sdk')) {
                            console.log("Blocked loading: " + url);
                            return;
                        }
                        this.setAttribute('src', url);
                    }
                });
            }
            return element;
        };
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/icestyle.css" type="text/css">
</head>
<body>
