<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Big NEON Tower vs Tiny Square</title>

    <style>
        body { background-color: #000; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        /* Layer 1: Hide any potential ad elements via CSS */
        iframe, ins, [id*="ad"], [class*="ad-"], #gamemonetize-sdk, #poki-sdk-container { 
            display: none !important; opacity: 0 !important; pointer-events: none !important; 
        }
    </style>

    <script>
        // LAYER 2: INTERCEPT ALL NETWORK CALLS (The Global Kill-Switch)
        const ALLOWED_DOMAINS = ['cdn.jsdelivr.net', 'bubbls.github.io'];

        // Overwrite XMLHttpRequest (Old school ad calls)
        const proxiedOpen = window.XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function(method, url) {
            if (typeof url === 'string' && !ALLOWED_DOMAINS.some(d => url.includes(d))) {
                console.log('BLOCKED XHR:', url);
                return; // Kill the request
            }
            return proxiedOpen.apply(this, arguments);
        };

        // Overwrite Fetch (Modern ad calls)
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
            const url = typeof input === 'string' ? input : input.url;
            if (typeof url === 'string' && !ALLOWED_DOMAINS.some(d => url.includes(d))) {
                console.log('BLOCKED FETCH:', url);
                return Promise.resolve(new Response('', { status: 200 }));
            }
            return originalFetch.apply(this, arguments);
        };

        // LAYER 3: DUMMY SDKs (The "Success Signal")
        const silent = () => {};
        const success = () => Promise.resolve();
        
        window.SDK_OPTIONS = { gameId: "none", onEvent: silent };
        window.sdk = { 
            showBanner: (callback) => { if(callback) callback(); }, 
            init: success, 
            resumeGame: success 
        };
        window.PokiSDK = { 
            init: success, 
            ads: { breakCheck: success, adFinished: () => true },
            gameLoadingStart: silent, 
            gameLoadingFinished: silent 
        };
        
        // LAYER 4: PREVENT REDIRECTS (Stop the game from opening new tabs)
        window.open = function() { return null; };

        // LAYER 5: DOM WATCHDOG (Delete ads that try to inject via script)
        setInterval(() => {
            document.querySelectorAll('iframe, ins, #gamemonetize-sdk').forEach(el => el.remove());
        }, 50);
    </script>
</head>
<body>
    <div id="fb-root"></div>
    
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/icewasm.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/icecheck.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/office.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/mainice.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/regisice.js" type="module"></script>
</body>
</html>
