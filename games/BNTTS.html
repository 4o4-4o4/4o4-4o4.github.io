<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Big NEON Tower vs Tiny Square</title>

    <style>
        body { background-color: #be1a1a; margin: 0; overflow: hidden; }
        /* Hide any ad frames that try to render */
        #gamemonetize-sdk, .gm-ad-container, iframe[src*="gamemonetize"] { 
            display: none !important; 
            visibility: hidden !important; 
        }
    </style>

    <script>
        // 1. NEUTRALIZE GAME MONETIZE SDK
        // We define the SDK options BEFORE the game loads
        window.SDK_OPTIONS = {
            gameId: "bigneontower", // Generic ID
            onEvent: function(event) {
                switch (event.name) {
                    case "SDK_READY":
                        console.log("Fake SDK Ready");
                        break;
                    case "SDK_GAME_PAUSE":
                        // If the game tries to pause for an ad, we immediately tell it to start again
                        console.log("Ad break requested... skipping.");
                        if (window.sdk && typeof window.sdk.resumeGame === "function") {
                            window.sdk.resumeGame();
                        }
                        break;
                    case "SDK_GAME_START":
                        console.log("Game resumed.");
                        break;
                }
            }
        };

        // 2. CREATE A FAKE SDK OBJECT
        // This prevents "sdk is not defined" errors
        window.sdk = {
            showBanner: function() { 
                console.log("Banner blocked.");
                // Immediately trigger the 'start' event so the game doesn't wait
                if (window.SDK_OPTIONS.onEvent) {
                    window.SDK_OPTIONS.onEvent({ name: "SDK_GAME_START" });
                }
            },
            init: function() { return true; },
            resumeGame: function() { return true; }
        };

        // 3. PREVENT EXTERNAL LOADING
        // We "kill" the actual script request if it tries to load
        window.addEventListener('beforescriptexecute', function(e) {
            if (e.target.src && e.target.src.includes('gamemonetize.com')) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);
    </script>
</head>
<body>
    <div id="fb-root"></div>
    
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/icewasm.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/icecheck.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/office.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/mainice.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@cffc5228787a33d303fc45db671a9dd7de905fd5/regisice.js" type="module"></script>
</body>
</html>
