<!-- Slope 2 UBlocker (FULLSCREEN FIXED VERSION) -->
<!DOCTYPE html>
<html>
<head>
  <title>Slope 2 - UBlocker</title>

  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <link rel="stylesheet" href="Components/gameloader.css" />
  <script src="Components/gameloader.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    /* force game to fill screen */
    #gameContainer, canvas, iframe {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>

<body>

<script>
  var options = {
    author: "Vseigru",
    logo: "logo.jpg",

    gameName: "Slope 2",
    gameNameEu: "Slope 2",

    gameUrl: "https://slope2.abcya.ga",

    moreLink: "https://slope2.abcya.ga",

    allowFullscreen: true,   // FIXED (was false)
    locale: "en_US",
    loader: "5.6.x",

    loaderOptions: {
      moduleJsonUrl: "Components/Slope 2.json",
      unityLoaderUrl: "Components/UnityLoader.js"
    }
  };

  GameInit.load(options);
</script>

<script>
  // remove annoying leave popup
  window.onbeforeunload = null;
</script>

</body>
</html>
