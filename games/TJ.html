<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tube Jumpers - Ad Free</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net;">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        ruffle-player { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="player"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/ruffle-rs/ruffle@main/web/ruffle.js"></script>
    
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("player");
            container.appendChild(player);
            
            // This loads the original game file from a clean CDN
            player.load("https://cdn.jsdelivr.net/gh/bubbls/ruffle@main/tube-jumpers.swf").then(() => {
                console.log("Tube Jumpers loaded successfully");
            }).catch((e) => {
                console.error("Failed to load game:", e);
            });

            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>

</body>
</html>
