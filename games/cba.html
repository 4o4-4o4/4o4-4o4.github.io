<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Space Waves</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        
        #unity-container { width: 100%; height: 100%; position: relative; }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        #loading-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }

        .spinner {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top: 5px solid #3498db; border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #progress-bar {
            width: 200px; height: 10px; background: #333;
            border-radius: 5px; margin-top: 20px; overflow: hidden;
        }

        #progress-fill { width: 0%; height: 100%; background: #3498db; transition: 0.5s; }

        p { color: #666; font-family: sans-serif; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="unity-container">
        <iframe id="game-frame" src="https://edumatt.github.io/spacewaves/"></iframe>
        
        <div id="loading-cover">
            <div class="spinner"></div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <p>Loading Space Waves...</p>
        </div>
    </div>

    <script>
        const frame = document.getElementById('game-frame');
        const loadingCover = document.getElementById('loading-cover');
        const progressFill = document.getElementById('progress-fill');

        // Fake progress bar logic for better UX
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress >= 90) {
                progress = 90;
                clearInterval(interval);
            }
            progressFill.style.width = progress + "%";
        }, 150);

        // Actual load detection
        frame.onload = () => {
            progressFill.style.width = "100%";
            setTimeout(() => {
                loadingCover.style.display = "none";
                frame.focus();
            }, 500);
        };

        // --- PANIC KEY: Shift + 1 ---
        window.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === '1') {
                window.top.location.href = "https://classroom.google.com";
            }
        });

        // Ensure keyboard input works by forcing focus back to game
        window.addEventListener("mousedown", () => frame.focus());
        
        // Some browsers block focus on load, so we try again after a click
        document.body.addEventListener('click', () => {
            frame.focus();
        }, { once: true });
    </script>
</body>
</html>
