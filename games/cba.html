<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Space Waves</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        
        #unity-container { width: 100%; height: 100%; position: relative; }
        #unity-canvas { width: 100% !important; height: 100% !important; background: #000; }
        
        #loading-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }

        .spinner {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top: 5px solid #3498db; border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #progress-bar {
            width: 200px; height: 10px; background: #333;
            border-radius: 5px; margin-top: 20px; overflow: hidden;
        }

        #progress-fill { width: 0%; height: 100%; background: #3498db; transition: 0.2s; }
        
        /* Hidden UI for Panic */
        #panic-overlay { display: none; }
    </style>
</head>
<body>

    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="loading-cover">
            <div class="spinner"></div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <p style="color: #666; font-family: sans-serif; margin-top: 10px;">Loading Space Waves...</p>
        </div>
    </div>

    <script>
        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressFill = document.querySelector("#progress-fill");

        const buildUrl = "https://slope3.com/game/space-wave/Build";
        const config = {
            dataUrl: buildUrl + "/568ea6b3af616bd57f419c508c933303.data.unityweb",
            frameworkUrl: buildUrl + "/c699bc4c24abfbdb4c8b3e15b0af7d3f.framework.js.unityweb",
            codeUrl: buildUrl + "/7fb5141de5923189bc1dc5f94eb619f2.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "do.Games",
            productName: "Space Waves",
            productVersion: "1.1.2-ms",
        };

        // --- PANIC INTEGRATION ---
        window.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === '1') window.top.location.href = "https://classroom.google.com";
        });

        const script = document.createElement("script");
        script.src = buildUrl + "/dae5c7bd2b15915f51ae4e56b8f5367d.loader.js";
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressFill.style.width = (100 * progress) + "%";
            }).then((unityInstance) => {
                loadingCover.style.display = "none";
                // Auto-focus the game
                canvas.focus();
            }).catch((message) => {
                console.error(message);
            });
        };
        document.body.appendChild(script);

        // Keep focus on the game
        window.addEventListener("mousedown", () => canvas.focus());
    </script>
</body>
</html>
