<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Capybara Clicker | Clean</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #game-container { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #loading-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top: 4px solid #f39c12; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-cover">
        <div class="spinner"></div>
        <p style="color: #eee; font-family: sans-serif; margin-top: 15px;">Loading Capybara...</p>
    </div>

    <div id="game-container">
        <iframe src="https://capybara-game.com/game/capybara-clicker/" id="game-frame"></iframe>
    </div>

    <script>
        const frame = document.getElementById('game-frame');
        const loader = document.getElementById('loading-cover');

        // --- PANIC HOTKEY (Shift + 1) ---
        window.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === '1') {
                window.top.location.href = "https://classroom.google.com";
            }
        });

        // Remove loader when iframe is ready
        frame.onload = () => {
            loader.style.display = 'none';
            frame.focus();
        };

        // Anti-Ad Script Injection
        window.showInterstitialAd = () => Promise.resolve();
        window.show_ads_inGame = () => { console.log("Ads Blocked"); };
    </script>
</body>
</html>
