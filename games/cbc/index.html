<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capybara Clicker</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #8B4513; /* Marrom */
            color: white;
        }
        #capybara {
            width: 200px;
            cursor: pointer;
        }
        .button {
            margin: 10px;
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
            background-color: #D2B48C; /* Marrom claro */
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Capybara Clicker</h1>
    <p>Capybaras: <span id="count">0</span></p>
    <button class="button" onclick="addCapybara()">CLIQUE AQUI</button>
    <br>
    <button class="button" onclick="buyUpgrade(1, 10, 'upgrade1')">Upgrade +1 por clique - Custo: <span id="upgrade1">10</span></button>
    <button class="button" onclick="buyUpgrade(2, 50, 'upgrade2')">Upgrade +2 por clique - Custo: <span id="upgrade2">50</span></button>
    <button class="button" onclick="buyUpgrade(5, 200, 'upgrade3')">Upgrade +5 por clique - Custo: <span id="upgrade3">200</span></button>
    <button class="button" onclick="buyAuto(1, 100, 'auto1')">Gerador +1/s - Custo: <span id="auto1">100</span></button>
    <button class="button" onclick="buyAuto(5, 500, 'auto2')">Gerador +5/s - Custo: <span id="auto2">500</span></button>
    <button class="button" onclick="rebirth()">Rebirth 🔁 - Custo: <span id="rebirthCost">1000</span></button>
    
    <script>
        let capybaras = 0;
        let perClick = 1;
        let perSecond = 0;
        let rebirthCost = 1000;
        let multiplier = 1;
        let upgrades = { upgrade1: 10, upgrade2: 50, upgrade3: 200 };
        let autos = { auto1: 100, auto2: 500 };

        function addCapybara() {
            capybaras += perClick * multiplier;
            updateUI();
        }

        function buyUpgrade(amount, cost, id) {
            if (capybaras >= upgrades[id]) {
                capybaras -= upgrades[id];
                perClick += amount;
                upgrades[id] = Math.floor(upgrades[id] * 1.5);
                updateUI();
            }
        }

        function buyAuto(amount, cost, id) {
            if (capybaras >= autos[id]) {
                capybaras -= autos[id];
                perSecond += amount;
                autos[id] = Math.floor(autos[id] * 1.5);
                updateUI();
            }
        }

        function rebirth() {
            if (capybaras >= rebirthCost) {
                capybaras = 0;
                perClick = 1;
                perSecond = 0;
                multiplier *= 2;
                rebirthCost = Math.floor(rebirthCost * 2);
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById("count").innerText = capybaras;
            document.getElementById("upgrade1").innerText = upgrades.upgrade1;
            document.getElementById("upgrade2").innerText = upgrades.upgrade2;
            document.getElementById("upgrade3").innerText = upgrades.upgrade3;
            document.getElementById("auto1").innerText = autos.auto1;
            document.getElementById("auto2").innerText = autos.auto2;
            document.getElementById("rebirthCost").innerText = rebirthCost;
        }

        setInterval(() => {
            capybaras += perSecond * multiplier;
            updateUI();
        }, 1000);
    </script>
</body>
</html>
