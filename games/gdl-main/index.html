<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Geometry Dash Lite</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #gameContainer { width: 100vw; height: 100vh; }
        #loader {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
            z-index: 99;
        }
        .progress { width: 300px; height: 20px; display: none; position: relative; margin-top: 20px; }
        .full { width: 100%; transform: scaleX(0); transform-origin: left; position: absolute; z-index: 2; }
        .box_process { width: 100%; position: absolute; z-index: 1; }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="loader">
        <img class="logo" src="gdl/image/loading.png" onerror="this.style.display='none'">
        <div class="progress">
            <img class="full" src="gdl/image/process_bar_back.png">
            <img class="box_process" src="gdl/image/process_bar_front.png">
        </div>
        <div class="spinner" id="spinner" style="width:50px; height:50px; border:5px solid #fff; border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script src="gdl/UnityLoader.js"></script>
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "gdl/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            const loader = document.getElementById("loader");
            const progressDiv = document.querySelector(".progress");
            const spinner = document.getElementById("spinner");

            if (!gameInstance.progress) {
                progressDiv.style.display = "block";
                spinner.style.display = "none";
                gameInstance.progress = progressDiv.querySelector(".full");
            }
            
            gameInstance.progress.style.transform = `scaleX(${progress})`;

            if (progress === 1) {
                setTimeout(() => { loader.style.display = "none"; }, 1500);
            }
        }
    </script>
</body>
</html>
