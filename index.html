<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Page not found · GitHub Pages</title>
    <link id="tab-icon" rel="icon" href="https://github.githubassets.com/favicons/favicon.svg">
    
    <style>
        :root { 
            --bg: #0b0b0b; --side: #121212; --accent: #4CAF50; 
            --text: #efefef; --card: #1e1e1e; --border: #333; 
            --input-bg: #000; --panic: #ff4444; 
        }

        /* --- THE CLEAN DECOY GATEKEEPER --- */
        #gatekeeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f9f9f9; display: flex; align-items: center; 
            justify-content: center; z-index: 10000; cursor: default;
        }
        #gatekeeper img { max-width: 100%; height: auto; }

        /* --- DASHBOARD STYLES --- */
        #trail-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 9999; display: none; 
        }

        * { box-sizing: border-box; }
        .dashboard-active * { cursor: none; } 

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg); 
            overflow: hidden; display: flex; font-family: 'Segoe UI', sans-serif; color: var(--text); 
        }

        #sidebar { 
            width: 260px; background: var(--side); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 15px 10px; flex-shrink: 0; 
        }

        .side-btn { 
            background: none; border: none; color: var(--text); opacity: 0.7; 
            text-align: left; padding: 12px; border-radius: 8px; 
            font-size: 14px; margin-bottom: 5px; transition: 0.2s; 
        }
        .side-btn:hover, .side-btn.active { background: var(--border); opacity: 1; color: var(--accent); }

        #main { display: flex; flex-direction: column; flex-grow: 1; height: 100vh; position: relative; overflow: hidden; }
        #top-nav { height: 65px; background: var(--side); padding: 0 20px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid var(--border); }
        #search { flex-grow: 1; background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: var(--text); outline: none; }
        
        #content-area, #settings-area { flex-grow: 1; overflow-y: auto; padding: 30px; }

        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .game-card { background: var(--card); border: 1px solid var(--border); padding: 40px 15px; border-radius: 16px; text-align: center; font-size: 15px; font-weight: bold; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent); transform: translateY(-8px); }

        #player-container { display: none; flex-grow: 1; background: #000; height: calc(100vh - 65px); }
        iframe { width: 100%; height: 100%; border: none; }

        .config-box { padding: 30px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .theme-opt { padding: 15px; border: 1px solid var(--border); border-radius: 10px; text-align: center; font-size: 12px; cursor: pointer; color: #fff; font-weight: bold; }
        .config-input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; }
    </style>
</head>

<body onload="init()">

    <canvas id="trail-canvas"></canvas>

    <div id="gatekeeper">
        <img src="abcabc.png" alt="Decoy">
    </div>

    <div id="sidebar">
        <h1 style="color:var(--accent); margin: 20px 0 40px 10px; font-size: 26px; font-weight: 900;">DASHBOARD</h1>
        <button id="nav-home" class="side-btn active" onclick="showTab('home')">Library</button>
        <button id="nav-settings" class="side-btn" onclick="showTab('settings')">Settings</button>
        <div style="margin-top: auto; padding: 10px; opacity: 0.4; font-size: 10px;">V7.0 FINAL</div>
    </div>

    <div id="main">
        <div id="top-nav">
            <input type="text" id="search" placeholder="Search 26 games..." oninput="renderGames()">
            <button id="back-lib" class="side-btn" style="display:none; width:auto; background:var(--border);" onclick="goHome()">Back</button>
            <button class="side-btn" style="width:auto; background:var(--panic); color:white; font-weight: bold;" onclick="panic()">PANIC</button>
        </div>

        <div id="content-area">
            <div id="game-grid"></div>
        </div>

        <div id="settings-area" style="display: none;">
            <div class="config-box">
                <h3>Background Modes (15)</h3>
                <div class="theme-grid" id="theme-grid"></div>
            </div>
            <div class="config-box">
                <h3>Cloaking</h3>
                <input type="text" id="cloak-name" class="config-input" placeholder="Tab Title" oninput="saveSettings()">
                <input type="text" id="cloak-url" class="config-input" placeholder="Icon URL" oninput="saveSettings()">
            </div>
        </div>

        <div id="player-container">
            <iframe id="game-view" src=""></iframe>
        </div>
    </div>

    <script>
        const combo = "404";
        let inputSeq = "";
        let panicSeq = "";
        
        const gameList = [
            {n: "Bloons TD", p: "./games/bloonstd/index.html"}, 
            {n: "Geo Dash", p: "./games/geodash/index.html"},
            {n: "Duck Life 3", p: "./games/ducklife3/index.html"}, 
            {n: "Slope", p: "./games/slope/index.html"},
            {n: "2048", p: "./games/2048/index.html"}, 
            {n: "World's Hardest Game", p: "./games/worlds-hardest-game/index.html"},
            {n: "Flappy Bird", p: "./games/flappybird/index.html"}, 
            {n: "Sand", p: "./games/Sand.html"},
            {n: "Basket Random", p: "./games/basket-random/index.html"}, 
            {n: "Drive Mad", p: "./games/drive-mad/index.html"},
            {n: "1v1 LOL", p: "./games/1v1lol/index.html"}, 
            {n: "BTTS", p: "./BTTS/index.html"},
            {n: "Vex 7", p: "./games/vex7/index.html"}, 
            {n: "MOTOX3M POOL", p: "./games/motox3m-pool/index.html"},
            {n: "OVO", p: "./games/OVO/index.html"}, 
            {n: "Ball Blast", p: "./games/Ball Blast.html"},
            {n: "Dunes", p: "./games/Dune.html"}, 
            {n: "Appel", p: "./games/Appel v1.html"},
            {n: "Paper Minecraft", p: "./games/Paper Minecraft v11.html"},
            {n: "Square Sling", p: "./games/SS.html"},
            {n: "Dunk Shot", p: "./games/DS.html"}, 
            {n: "Sky Ball", p: "./games/SB.html"},
            {n: "BITTS", p: "./games/BITTS/BITTS.html"}, 
            {n: "Tag #2", p: "./games/Tag-main/index.html"},
            {n: "Cookie Clicker", p: "./CC/index.html"}, 
            {n: "Tube Jumpers", p: "./games/TJ.html"}
        ];

        const themes = [
            {name: "Dark", bg: "#0b0b0b", side: "#121212", acc: "#4CAF50"},
            {name: "Midnight", bg: "#050a14", side: "#0a1428", acc: "#3498db"},
            {name: "Emerald", bg: "#06140c", side: "#0b2618", acc: "#2ecc71"},
            {name: "Purple", bg: "#120514", side: "#1e0a24", acc: "#9b59b6"},
            {name: "Crimson", bg: "#140505", side: "#260b0b", acc: "#e74c3c"},
            {name: "Cyber", bg: "#000", side: "#0a0a0a", acc: "#ff00ff"},
            {name: "Gold", bg: "#141105", side: "#1f1a08", acc: "#f1c40f"},
            {name: "Ocean", bg: "#000c18", side: "#001529", acc: "#00d2ff"},
            {name: "Vampire", bg: "#000", side: "#000", acc: "#800000"},
            {name: "Ghost", bg: "#1a1a1a", side: "#222", acc: "#fff"},
            {name: "Solar", bg: "#1a0f05", side: "#291808", acc: "#e67e22"},
            {name: "Nebula", bg: "#12051a", side: "#1c0829", acc: "#8e44ad"},
            {name: "Rust", bg: "#1a0d05", side: "#291508", acc: "#d35400"},
            {name: "Glacier", bg: "#0f1a1a", side: "#182929", acc: "#1abc9c"},
            {name: "Sakura", bg: "#1a0f12", side: "#29181c", acc: "#e91e63"}
        ];

        window.onkeydown = e => {
            if (get('gatekeeper').style.display !== 'none') {
                inputSeq += e.key;
                if (inputSeq.endsWith(combo)) unlock();
                if (inputSeq.length > 5) inputSeq = ""; 
            }
            panicSeq += e.key.toLowerCase();
            if (panicSeq.endsWith("panic")) panic();
            if (panicSeq.length > 10) panicSeq = "";
        };

        function get(id) { return document.getElementById(id); }

        function unlock() {
            get('gatekeeper').style.display = 'none';
            get('trail-canvas').style.display = 'block';
            document.body.classList.add('dashboard-active');
            sessionStorage.setItem('auth_404', 'true');
        }

        function renderGames() {
            const grid = get('game-grid');
            const term = get('search').value.toLowerCase();
            grid.innerHTML = '';
            gameList.filter(g => g.n.toLowerCase().includes(term)).forEach(g => {
                const c = document.createElement('div');
                c.className = 'game-card';
                c.innerText = g.n;
                c.onclick = () => {
                    get('content-area').style.display = 'none';
                    get('player-container').style.display = 'block';
                    get('back-lib').style.display = 'block';
                    get('game-view').src = g.p;
                };
                grid.appendChild(c);
            });
        }

        function goHome() {
            get('game-view').src = '';
            get('player-container').style.display = 'none';
            get('back-lib').style.display = 'none';
            get('content-area').style.display = 'block';
        }

        function showTab(t) {
            goHome();
            get('content-area').style.display = t === 'home' ? 'block' : 'none';
            get('settings-area').style.display = t === 'settings' ? 'block' : 'none';
            document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
            get('nav-' + t).classList.add('active');
        }

        function applyTheme(t) {
            const r = document.documentElement.style;
            r.setProperty('--bg', t.bg);
            r.setProperty('--side', t.side);
            r.setProperty('--accent', t.acc);
            localStorage.setItem('p404_theme', JSON.stringify(t));
        }

        function saveSettings() {
            const n = get('cloak-name').value;
            const u = get('cloak-url').value;
            localStorage.setItem('p404_cloak', JSON.stringify({n, u}));
            document.title = n || "Page not found · GitHub Pages";
            get('tab-icon').href = u || "https://github.githubassets.com/favicons/favicon.svg";
        }

        function panic() { window.top.location.replace('https://classroom.google.com'); }

        function init() {
            const grid = get('theme-grid');
            themes.forEach(t => {
                const o = document.createElement('div');
                o.className = 'theme-opt';
                o.innerText = t.name;
                o.style.background = t.bg;
                o.onclick = () => applyTheme(t);
                grid.appendChild(o);
            });
            const st = JSON.parse(localStorage.getItem('p404_theme'));
            if (st) applyTheme(st);
            renderGames();
            if (sessionStorage.getItem('auth_404') === 'true') unlock();
            requestAnimationFrame(drawTrail);
        }

        /* --- TRAIL ENGINE --- */
        const canvas = get('trail-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        let mouse = {x: 0, y: 0};

        window.onmousemove = e => {
            if (get('gatekeeper').style.display !== 'none') return;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            points.push({x: mouse.x, y: mouse.y, age: 0});
        };

        function drawTrail() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (get('gatekeeper').style.display !== 'none') return requestAnimationFrame(drawTrail);

            ctx.beginPath();
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                p.age += 1;
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
            points = points.filter(p => p.age < 25);
            ctx.fillStyle = ctx.strokeStyle;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 4, 0, Math.PI * 2);
            ctx.fill();
            requestAnimationFrame(drawTrail);
        }
    </script>
</body>
</html>
