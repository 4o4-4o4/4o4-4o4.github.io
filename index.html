<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">My Apps</title>
    <link id="tab-icon" rel="icon" href="https://filescdn.classlink.com/resources/customlinks/1601307234673-fbb20dacacaf8359984dc1276e57ddc6.png">
    
    <style>
        :root { 
            --bg: #0b0b0b; --bg2: #0b0b0b; --side: #121212; --text: #efefef; 
            --card: rgba(30, 30, 30, 0.9); --border: #333; --accent: #3498db;
            --glow: rgba(52, 152, 219, 0.4);
        }

        /* --- THE 25 NAMED STYLES --- */
        [data-look="1"] { --bg: #000800; --bg2: #000800; --side: #000500; --text: #00ff00; --card: rgba(0, 15, 0, 0.9); --border: #004400; --accent: #00ff00; }
        [data-look="2"] { --bg: #0a0000; --bg2: #0a0000; --side: #150000; --text: #ff4d4d; --card: rgba(35, 0, 0, 0.9); --border: #550000; --accent: #ff0000; }
        [data-look="3"] { --bg: #000b1a; --bg2: #000b1a; --side: #00122e; --text: #00fff2; --card: rgba(0, 20, 50, 0.9); --border: #00fff2; --accent: #f0f; }
        [data-look="4"] { --bg: #ffffff; --bg2: #ffffff; --side: #f0f0f0; --text: #111; --card: rgba(220, 220, 220, 0.9); --border: #bbb; --accent: #3498db; }
        [data-look="5"] { --bg: #1a0026; --bg2: #1a0026; --side: #11001a; --text: #e600ff; --card: rgba(40, 0, 60, 0.9); --border: #e600ff; --accent: #e600ff; }
        [data-look="6"] { --bg: #001a0d; --bg2: #001a0d; --side: #000d06; --text: #00ff80; --card: rgba(0, 40, 20, 0.9); --border: #00ff80; --accent: #00ff80; }
        [data-look="7"] { --bg: #1a0f00; --bg2: #1a0f00; --side: #0d0800; --text: #ff9900; --card: rgba(40, 25, 0, 0.9); --border: #ff9900; --accent: #ff9900; }
        [data-look="8"] { --bg: #00141a; --bg2: #00141a; --side: #000a0d; --text: #00d9ff; --card: rgba(0, 30, 40, 0.9); --border: #00d9ff; --accent: #00d9ff; }
        [data-look="9"] { --bg: #1a0000; --bg2: #1a0000; --side: #0d0000; --text: #ff0000; --card: rgba(50, 0, 0, 0.9); --border: #ff0000; --accent: #ff0000; }
        [data-look="10"] { --bg: #0d0d0d; --bg2: #0d0d0d; --side: #000; --text: #fff; --card: rgba(30, 30, 30, 0.9); --border: #fff; --accent: #fff; }
        [data-look="11"] { --bg: #1a1a00; --bg2: #1a1a00; --side: #0d0d00; --text: #ffff00; --card: rgba(40, 40, 0, 0.9); --border: #ffff00; --accent: #ffff00; }
        [data-look="12"] { --bg: #0a0a1a; --bg2: #0a0a1a; --side: #05050d; --text: #5c5cff; --card: rgba(15, 15, 45, 0.9); --border: #5c5cff; --accent: #5c5cff; }
        [data-look="13"] { --bg: #1a000d; --bg2: #1a000d; --side: #0d0006; --text: #ff0080; --card: rgba(40, 0, 20, 0.9); --border: #ff0080; --accent: #ff0080; }
        [data-look="14"] { --bg: #001a1a; --bg2: #001a1a; --side: #000d0d; --text: #00ffff; --card: rgba(0, 40, 40, 0.9); --border: #00ffff; --accent: #00ffff; }
        [data-look="15"] { --bg: #0d1a00; --bg2: #0d1a00; --side: #060d00; --text: #80ff00; --card: rgba(20, 40, 0, 0.9); --border: #80ff00; --accent: #80ff00; }
        [data-look="16"] { --bg: #1a0d00; --bg2: #1a0d00; --side: #0d0600; --text: #ff8000; --card: rgba(40, 20, 0, 0.9); --border: #ff8000; --accent: #ff8000; }
        [data-look="17"] { --bg: #000d1a; --bg2: #000d1a; --side: #00060d; --text: #0080ff; --card: rgba(0, 20, 40, 0.9); --border: #0080ff; --accent: #0080ff; }
        [data-look="18"] { --bg: #0d001a; --bg2: #0d001a; --side: #06000d; --text: #8000ff; --card: rgba(20, 0, 40, 0.9); --border: #8000ff; --accent: #8000ff; }
        [data-look="19"] { --bg: #1a001a; --bg2: #1a001a; --side: #0d000d; --text: #ff00ff; --card: rgba(40, 0, 40, 0.9); --border: #ff00ff; --accent: #ff00ff; }
        [data-look="20"] { --bg: #001a00; --bg2: #001a00; --side: #000d00; --text: #00ff00; --card: rgba(0, 40, 0, 0.9); --border: #00ff00; --accent: #00ff00; }
        [data-look="21"] { --bg: #222; --bg2: #222; --side: #111; --text: #888; --card: rgba(40, 40, 40, 0.9); --border: #444; --accent: #666; }
        [data-look="22"] { --bg: #050505; --bg2: #050505; --side: #000; --text: #bb86fc; --card: rgba(20, 20, 20, 0.9); --border: #bb86fc; --accent: #bb86fc; }
        [data-look="23"] { --bg: #050505; --bg2: #050505; --side: #000; --text: #03dac6; --card: rgba(20, 20, 20, 0.9); --border: #03dac6; --accent: #03dac6; }
        [data-look="24"] { --bg: #002b36; --bg2: #002b36; --side: #073642; --text: #839496; --card: rgba(0, 43, 54, 0.9); --border: #93a1a1; --accent: #268bd2; }
        [data-look="25"] { --bg: #282c34; --bg2: #282c34; --side: #21252b; --text: #abb2bf; --card: rgba(44, 49, 58, 0.9); --border: #61afef; --accent: #c678dd; }

        * { box-sizing: border-box; outline: none; transition: background 0.2s, color 0.2s, border 0.2s; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: linear-gradient(135deg, var(--bg), var(--bg2)); overflow: hidden; display: flex; font-family: 'Segoe UI', sans-serif; color: var(--text); }
        
        body.unlocked, body.unlocked * { cursor: none !important; }
        #trail-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        /* --- GATEKEEPER --- */
        #gatekeeper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #pass-input { background: #111; border: 2px solid #333; color: #fff; padding: 15px 25px; font-size: 20px; border-radius: 8px; text-align: center; transition: 0.3s; width: 250px; }
        #pass-input:focus { border-color: #3498db; box-shadow: 0 0 15px rgba(52, 152, 219, 0.4); }

        #sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 15px; flex-shrink: 0; z-index: 10; }
        .side-btn { background: none; border: 1px solid transparent; color: var(--text); opacity: 0.8; text-align: left; padding: 12px 15px; border-radius: 8px; font-size: 14px; margin-bottom: 5px; cursor: none !important; }
        .side-btn.active, .side-btn:hover { background: var(--border); opacity: 1; color: var(--accent); border-left: 4px solid var(--accent); }

        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; z-index: 1; }
        #top-nav { height: 60px; background: var(--side); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid var(--border); }
        #search { flex-grow: 1; background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: var(--text); cursor: none !important; }
        
        #content-area, #records-area, #settings-area { flex-grow: 1; overflow-y: auto; padding: 30px; display: none; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border: 1px solid var(--border); padding: 45px 10px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 16px; transition: 0.3s; cursor: none !important; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }

        #launcher { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #game-frame { width: 100%; height: 100%; border: none; }
        #close-launcher { position: absolute; top: 20px; right: 20px; background: #ff4444; color: white; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; z-index: 5001; cursor: none !important; }
        
        .config-box { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }

        .theme-controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .color-input-wrap { display: flex; flex-direction: column; gap: 5px; font-size: 12px; }
        input[type="color"] { width: 50px; height: 35px; border: 2px solid var(--border); border-radius: 4px; background: none; cursor: none !important; }
    </style>
</head>
<body onload="init()">
    <canvas id="trail-canvas"></canvas>
    
    <div id="gatekeeper">
        <input type="password" id="pass-input" placeholder="Password" autocomplete="off" />
    </div>

    <div id="launcher">
        <button id="close-launcher" onclick="closeGame()">EXIT HOME</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <div id="sidebar">
        <h2 style="margin-left:10px; color:var(--accent); font-size: 28px;">404</h2>
        <button id="nav-home" class="side-btn active" onclick="showTab('home')">Home</button>
        <button id="nav-records" class="side-btn" onclick="showTab('records')">Records</button>
        <button id="nav-settings" class="side-btn" onclick="showTab('settings')">Settings</button>
    </div>

    <div id="main">
        <div id="top-nav">
            <input type="text" id="search" placeholder="Search..." oninput="renderGames()">
            <button class="side-btn" style="background:#cc0000; color:white; opacity:1;" onclick="panic()">PANIC</button>
        </div>
        <div id="content-area" style="display: block;"><div id="game-grid"></div></div>
        <div id="records-area"><textarea id="records-text" oninput="saveRecords()" style="width:100%; height:450px; background:rgba(0,0,0,0.3); color:var(--text); padding:20px; border:none; resize:none; cursor: none !important;"></textarea></div>
        
        <div id="settings-area">
            <div class="config-box">
                <h2>Custom Theme Builder</h2>
                <div class="theme-controls">
                    <div class="color-input-wrap"><label>BG 1</label><input type="color" id="color-bg" oninput="updateCustomTheme()"></div>
                    <div class="color-input-wrap"><label>BG 2</label><input type="color" id="color-bg2" oninput="updateCustomTheme()"></div>
                    <div class="color-input-wrap"><label>Sidebar</label><input type="color" id="color-side" oninput="updateCustomTheme()"></div>
                    <div class="color-input-wrap"><label>Accent</label><input type="color" id="color-accent" oninput="updateCustomTheme()"></div>
                    <div class="color-input-wrap"><label>Text</label><input type="color" id="color-text" oninput="updateCustomTheme()"></div>
                    <button class="side-btn" onclick="resetToPreset()">Reset</button>
                </div>
            </div>

            <div class="config-box">
                <h2>Cloak Presets</h2>
                <div class="grid-layout">
                    <button class="side-btn" onclick="setPreset('My Apps', 'https://filescdn.classlink.com/resources/customlinks/1601307234673-fbb20dacacaf8359984dc1276e57ddc6.png')">My Apps</button>
                    <button class="side-btn" onclick="setPreset('Classroom', 'https://ssl.gstatic.com/classroom/favicon.png')">Classroom</button>
                    <button class="side-btn" onclick="setPreset('IXL', 'https://www.ixl.com/favicon.ico')">IXL</button>
                    <button class="side-btn" onclick="setPreset('Google Slides', 'slides.png')">Slides</button>
                </div>
            </div>
            
            <div class="config-box">
                <h2>Visual Themes</h2>
                <div id="style-grid" class="grid-layout"></div>
            </div>
            
            <div class="config-box" style="border-color: #ff4444;">
                <h2 style="color: #ff4444;">Danger Zone</h2>
                <button class="side-btn" style="background:#ff4444; color:white; opacity:1;" onclick="nukeStorage()">Reset Everything</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('trail-canvas'); const ctx = canvas.getContext('2d'); 
        let points = []; let ripple = {x:0, y:0, r:0, a:0};
        
        const styleNames = ["Matrix", "Bloodlust", "Vaporwave", "Ghost", "Nebula", "Toxic", "Lava", "Ocean", "Crimson", "Noir", "Lemon", "Cobalt", "Barbie", "Cyan", "Lime", "Autumn", "Sky", "Amethyst", "Magenta", "Emerald", "Slate", "Midnight", "Teal", "Solar", "Atom"];

        const games = [
            {n: "Capybara Clicker", p: "./games/cbc/index.html"},
            {n: "Space Waves", p: "./games/cba.html"},
            {n: "Bloons TD", p: "./games/bloonstd/index.html"}, 
            {n: "Geo Dash", p: "./games/geodash/index.html"}, 
            {n: "Duck Life 3", p: "./games/ducklife3/index.html"}, 
            {n: "Slope", p: "./games/slope/index.html"}, 
            {n: "2048", p: "./games/2048/index.html"}, 
            {n: "World's Hardest Game", p: "./games/worlds-hardest-game/index.html"}, 
            {n: "Flappy Bird", p: "./games/flappybird/index.html"}, 
            {n: "Sand", p: "./games/Sand.html"}, 
            {n: "Basket Random", p: "./games/basket-random/index.html"}, 
            {n: "Drive Mad", p: "./games/drive-mad/index.html"}, 
            {n: "1v1 LOL", p: "./games/1v1lol/index.html"}, 
            {n: "BTTS", p: "./BTTS/index.html"}, 
            {n: "Vex 7", p: "./games/vex7/index.html"}, 
            {n: "MOTOX3M POOL", p: "./games/motox3m-pool/index.html"}, 
            {n: "OVO", p: "./games/OVO/index.html"}, 
            {n: "Ball Blast", p: "./games/Ball Blast.html"}, 
            {n: "Dunes", p: "./games/Dune.html"}, 
            {n: "Appel", p: "./games/Appel v1.html"}, 
            {n: "Paper Minecraft", p: "./games/Paper Minecraft v11.html"}, 
            {n: "Square Sling", p: "./games/SS.html"}, 
            {n: "Dunk Shot", p: "./games/DS.html"}, 
            {n: "Sky Ball", p: "./games/SB.html"}, 
            {n: "BITTS", p: "./games/BITTS/BITTS.html"}, 
            {n: "Tag #2", p: "./games/Tag-main/index.html"}, 
            {n: "BNTTS", p: "./games/BNTTS.html"}, 
            {n: "Tag OG", p: "./games/TAG/index.html"}, 
            {n: "Duck Life 1", p: "./games/DuckLife1/index.html"}, 
            {n: "Cut The Rope", p: "./games/CTR.html"}, 
            {n: "BTTS 2", p: "./games/BTTS2.html"}, 
            {n: "MineCraft", p: "./games/EC.html"}, 
            {n: "Mario 64", p: "./games/SM64.html"}, 
            {n: "Retro Bowl", p: "./games/RB.html"}, 
            {n: "Drift Boss", p: "./games/DB/DB.html"},
            {n: "Cookie Clicker", p: "./CC/index.html"},
            {n: "Tube Jumpers", p: "./games/TJ.html"}
        ];

        function updateCustomTheme() {
            const bg = document.getElementById('color-bg').value;
            const bg2 = document.getElementById('color-bg2').value;
            const side = document.getElementById('color-side').value;
            const acc = document.getElementById('color-accent').value;
            const txt = document.getElementById('color-text').value;
            document.body.removeAttribute('data-look');
            document.documentElement.style.setProperty('--bg', bg);
            document.documentElement.style.setProperty('--bg2', bg2);
            document.documentElement.style.setProperty('--side', side);
            document.documentElement.style.setProperty('--accent', acc);
            document.documentElement.style.setProperty('--text', txt);
            localStorage.setItem('p404_custom', JSON.stringify({bg, bg2, side, acc, txt}));
        }

        function resetToPreset() { localStorage.removeItem('p404_custom'); location.reload(); }
        function nukeStorage() { if(confirm("Nuke all data?")) { localStorage.clear(); location.reload(); } }

        function launchGame(url) { document.getElementById('launcher').style.display = 'block'; document.getElementById('game-frame').src = url; }
        function closeGame() { document.getElementById('launcher').style.display = 'none'; document.getElementById('game-frame').src = ""; }
        
        function showTab(t) {
            ['content', 'settings', 'records'].forEach(id => document.getElementById(id + '-area').style.display = 'none');
            document.getElementById(`${t === 'home' ? 'content' : t}-area`).style.display = 'block';
            ['nav-home', 'nav-records', 'nav-settings'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(`nav-${t}`).classList.add('active');
        }

        function renderGames() {
            const grid = document.getElementById('game-grid'); 
            const term = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            
            games.filter(g => g.n.toLowerCase().includes(term)).forEach(g => {
                const card = document.createElement('div'); card.className = 'game-card';
                card.innerText = g.n; card.onclick = () => launchGame(g.p); grid.appendChild(card);
            });
        }

        function buildStyleGrid() {
            const grid = document.getElementById('style-grid');
            styleNames.forEach((name, i) => {
                const b = document.createElement('button'); b.className = 'side-btn'; b.innerText = name;
                b.onclick = () => { document.body.setAttribute('data-look', i+1); localStorage.setItem('p404_look', i+1); localStorage.removeItem('p404_custom'); };
                grid.appendChild(b);
            });
        }

        function setPreset(t, i) { document.title = t; document.getElementById('tab-icon').href = i; localStorage.setItem('p404_t', t); localStorage.setItem('p404_i', i); }
        function panic() { window.location.href = "https://classroom.google.com"; }
        function saveRecords() { localStorage.setItem('p404_rec', document.getElementById('records-text').value); }

        window.onmousemove = e => { if(document.body.classList.contains('unlocked')) points.push({ x: e.clientX, y: e.clientY, age: 0 }); };
        window.onclick = e => { if(document.body.classList.contains('unlocked')) ripple = {x: e.clientX, y: e.clientY, r: 0, a: 1}; };

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const acc = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            if(points.length > 0) {
                const h = points[points.length-1]; ctx.fillStyle = acc; ctx.beginPath(); ctx.arc(h.x, h.y, 5, 0, 7); ctx.fill();
            }
            ctx.strokeStyle = acc; ctx.lineWidth = 3; ctx.beginPath();
            points.forEach((p, i) => { p.age++; if(i==0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
            ctx.stroke(); points = points.filter(p => p.age < 20);
            if(ripple.a > 0) {
                ctx.strokeStyle = acc; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(ripple.x, ripple.y, ripple.r+=4, 0, 7); ctx.stroke(); ripple.a -= 0.02;
            }
            requestAnimationFrame(animate);
        }

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            renderGames(); buildStyleGrid(); animate();
            
            // Password Setup
            const passInput = document.getElementById('pass-input');
            passInput.focus();
            passInput.addEventListener('input', (e) => {
                if (e.target.value === "404") {
                    document.getElementById('gatekeeper').style.display = 'none';
                    document.body.classList.add('unlocked');
                    passInput.value = ""; // Clear for security
                }
            });

            const custom = localStorage.getItem('p404_custom');
            if(custom) {
                const c = JSON.parse(custom);
                document.getElementById('color-bg').value = c.bg;
                document.getElementById('color-bg2').value = c.bg2 || c.bg;
                document.getElementById('color-side').value = c.side;
                document.getElementById('color-accent').value = c.acc;
                document.getElementById('color-text').value = c.txt;
                updateCustomTheme();
            } else {
                const l = localStorage.getItem('p404_look') || '1';
                document.body.setAttribute('data-look', l);
            }
            const t = localStorage.getItem('p404_t'); const i = localStorage.getItem('p404_i');
            const r = localStorage.getItem('p404_rec');
            if(t) document.title = t; if(i) document.getElementById('tab-icon').href = i;
            if(r) document.getElementById('records-text').value = r;
        }
    </script>
</body>
</html>
