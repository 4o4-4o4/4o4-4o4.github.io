<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">My Apps</title>
    <link id="tab-icon" rel="icon" href="">
    
    <style>
        :root { 
            --bg: #0b0b0b; 
            --side: #121212; 
            --text: #efefef; 
            --card: #1e1e1e; 
            --border: #333;
            --accent: #3498db;
        }

        /* OG Terminal Look Override */
        [data-og-look="true"] {
            --bg: #000800 !important;
            --side: #000500 !important;
            --text: #00ff00 !important;
            --card: #000c00 !important;
            --border: #003300 !important;
            --accent: #00ff00 !important;
            font-family: 'Courier New', monospace !important;
        }

        /* Retro Scanline Effect */
        .scanlines {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
        }
        [data-og-look="true"] .scanlines { display: block; }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            background: var(--bg); overflow: hidden; display: flex; 
            font-family: 'Segoe UI', sans-serif; color: var(--text); 
            transition: 0.2s; 
        }
        
        #sidebar { 
            width: 260px; background: var(--side); 
            border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; 
            padding: 15px 10px; flex-shrink: 0; 
        }

        .side-btn { 
            background: none; border: none; color: var(--text); 
            opacity: 0.7; text-align: left; padding: 12px; 
            cursor: pointer; border-radius: 8px; font-size: 14px; 
            margin-bottom: 5px; width: 100%; transition: 0.2s;
        }
        .side-btn:hover, .side-btn.active { 
            background: var(--border); opacity: 1; color: var(--accent); 
        }
        
        #main { display: flex; flex-direction: column; flex-grow: 1; position: relative; }
        #top-nav { 
            height: 60px; background: var(--side); 
            padding: 0 20px; display: flex; gap: 12px; 
            align-items: center; border-bottom: 1px solid var(--border); 
        }

        #search { 
            flex-grow: 1; background: var(--card); 
            border: 1px solid var(--border); padding: 10px; 
            border-radius: 6px; color: var(--text); outline: none; 
        }
        
        #content-area, #settings-area { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #settings-area { display: none; }
        
        #game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
        }

        .game-card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 20px 10px; border-radius: 12px; cursor: pointer; 
            text-align: center; font-size: 13px; font-weight: bold; 
            min-height: 90px; display: flex; align-items: center; 
            justify-content: center; color: var(--text); transition: 0.2s; 
        }
        .game-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        #player-container { display: none; flex-grow: 1; background: black; height: calc(100vh - 60px); }
        iframe { width: 100%; height: 100%; border: none; }

        .config-box { padding: 20px; background: var(--card); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .config-input { width: 100%; padding: 10px; margin-top: 5px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        select { background: #000; color: #fff; border: 1px solid var(--border); padding: 8px; border-radius: 5px; outline: none; }
    </style>
</head>
<body onload="init()">
    <div class="scanlines"></div>

    <div id="sidebar">
        <h1 id="main-logo" style="color:var(--accent); margin-left:10px; font-size:22px; margin-bottom:20px;">Project 404</h1>
        <button id="nav-home" class="side-btn active" onclick="showTab('home')">Home</button>
        <button id="nav-settings" class="side-btn" onclick="showTab('settings')">Settings</button>
        <div style="margin-top: auto; padding: 10px;">
            <button class="side-btn" style="font-size: 11px; opacity: 0.5; border: 1px solid var(--border);" onclick="runHistoryCloak()">Run History Cloak</button>
        </div>
    </div>

    <div id="main">
        <div id="top-nav">
            <input type="text" id="search" placeholder="Search for apps..." oninput="renderGames()">
            <button class="side-btn" style="background:#ff4444; color:white; width:auto; padding:10px 15px; font-weight:bold;" onclick="panic()">PANIC</button>
        </div>

        <div id="content-area">
            <div id="game-grid"></div>
        </div>

        <div id="settings-area">
            <div style="max-width: 600px; margin: 0 auto;">
                <h1>Settings</h1>
                
                <div class="config-box">
                    <h2 style="font-size:16px; margin-top:0;">Tab Cloaking</h2>
                    <div style="margin-bottom:15px;">
                        <label style="font-size:12px; opacity:0.7;">Tab Name</label>
                        <input type="text" id="cloak-name" class="config-input" placeholder="e.g. Google Docs" oninput="saveCloak()">
                    </div>
                    <div>
                        <label style="font-size:12px; opacity:0.7;">Favicon URL</label>
                        <input type="text" id="cloak-icon" class="config-input" placeholder="https://..." oninput="saveCloak()">
                    </div>
                </div>

                <div class="config-box">
                    <h2 style="font-size:16px; margin-top:0;">Visuals & Themes</h2>
                    <div class="setting-row">
                        <span>OG Terminal Look (Green/Black)</span>
                        <label class="switch">
                            <input type="checkbox" id="og-toggle" onchange="toggleOGLook(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <span>Theme Preset</span>
                        <select id="theme-select" onchange="setTheme(this.value)">
                            <option value="default">Default Dark</option>
                            <option value="neon">Neon Nights</option>
                            <option value="midnight">Midnight Purple</option>
                            <option value="sunset">Retro Sunset</option>
                            <option value="aero">Aero (Light)</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <span>Custom Accent Color</span>
                        <input type="color" id="accent-picker" oninput="updateAccent(this.value)">
                    </div>
                </div>
            </div>
        </div>

        <div id="player-container">
            <iframe id="game-view" src=""></iframe>
        </div>
    </div>

    <script>
        const gameList = [
            { name: "Bloons TD", path: "./games/bloonstd/index.html" },
            { name: "Geo Dash", path: "./games/geodash/index.html" },
            { name: "Duck Life 3", path: "./games/ducklife3/index.html" },
            { name: "Slope", path: "./games/slope/index.html" },
            { name: "2048", path: "./games/2048/index.html" },
            { name: "World's Hardest Game", path: "./games/worlds-hardest-game/index.html" },
            { name: "Flappy Bird", path: "./games/flappybird/index.html" },
            { name: "Bloons TD 2", path: "./games/bloonstd2/index.html" },
            { name: "Sand", path: "./games/Sand.html" },
            { name: "Basket Random", path: "./games/basket-random/index.html" },
            { name: "Drive Mad", path: "./games/drive-mad/index.html" },
            { name: "1v1 LOL", path: "./games/1v1lol/index.html" },
            { name: "Big Tower Tiny Square", path: "./BTTS/index.html" },
            { name: "Vex 7", path: "./games/vex7/index.html" },
            { name: "MOTOX3M POOL", path: "./games/motox3m-pool/index.html" },
            { name: "OVO", path: "./games/OVO/index.html" },
            { name: "Ball Blast", path: "./games/Ball Blast.html" },
            { name: "Dunes", path: "./games/Dune.html" },
            { name: "Appel", path: "./games/Appel v1.html" },
            { name: "Paper Minecraft", path: "./games/Paper Minecraft v11.html" },
            { name: "Square Sling", path: "./games/SS.html" },
            { name: "Dunk Shot", path: "./games/DS.html" },
            { name: "Sky Ball", path: "./games/SB.html" },
            { name: "Big Ice Tower Tiny Square", path: "./games/BITTS/BITTS.html" },
            { name: "Tag #2", path: "./games/Tag-main/index.html" },
            { name: "Cookie Clicker", path: "./CC/index.html" },
            { name: "Line Rider (TEST)", path: "./games/LR.html" },
            { name: "Space Waves (TEST)", path: "./games/cba.html" },
            { name: "Monkey Market (TEST)", path: "./games/MM.html" },
            { name: "Cut The Rope (TEST)", path: "./games/CTR.html" },
            { name: "Mario (TEST)", path: "./games/FSM/index.html" },
            { name: "Tag OG (TEST)", path: "./games/TAG/index.html" },
            { name: "Death Run 3D (TEST)", path: "./games/DR3D/index.html" },
            { name: "Big Neon Tower Tiny Square (TEST)", path: "./games/BNTTS.html" },
            { name: "Duck Life 1 (TEST)", path: "./games/DuckLife1/index.html" },
            { name: "Slither.io (TEST)", path: "./games/Slither.io/slither.io/index.html" },
            { name: "Tube Jumpers (TEST)", path: "./games/TJ.html" }
        ];

        const themes = {
            default: { bg: "#0b0b0b", side: "#121212", text: "#efefef", card: "#1e1e1e", border: "#333", accent: "#3498db" },
            neon: { bg: "#000", side: "#050505", text: "#fff", card: "#0a0a0a", border: "#ff00ff", accent: "#00ffff" },
            midnight: { bg: "#050510", side: "#08081a", text: "#d1d1ff", card: "#0c0c25", border: "#1a1a4d", accent: "#7000ff" },
            sunset: { bg: "#2b102b", side: "#1a081a", text: "#ffcc33", card: "#3d1a3d", border: "#ff3366", accent: "#ff6600" },
            aero: { bg: "#f0f2f5", side: "#ffffff", text: "#1a1a1a", card: "#ffffff", border: "#ddd", accent: "#0078d4" }
        };

        function saveCloak() {
            const cloak = {
                name: document.getElementById('cloak-name').value,
                icon: document.getElementById('cloak-icon').value
            };
            localStorage.setItem('p404_cloak', JSON.stringify(cloak));
            applyCloak(cloak);
        }

        function applyCloak(cloak) {
            if (cloak.name) document.title = cloak.name;
            if (cloak.icon) document.getElementById('tab-icon').href = cloak.icon;
        }

        function toggleOGLook(enabled) {
            document.body.setAttribute('data-og-look', enabled);
            localStorage.setItem('p404_og_look', enabled);
        }

        function setTheme(key) {
            const t = themes[key] || themes.default;
            const r = document.documentElement.style;
            r.setProperty('--bg', t.bg);
            r.setProperty('--side', t.side);
            r.setProperty('--text', t.text);
            r.setProperty('--card', t.card);
            r.setProperty('--border', t.border);
            r.setProperty('--accent', t.accent);
            document.getElementById('accent-picker').value = t.accent;
            localStorage.setItem('p404_theme', key);
        }

        function updateAccent(val) {
            document.documentElement.style.setProperty('--accent', val);
            localStorage.setItem('p404_accent', val);
        }

        function renderGames() {
            const grid = document.getElementById('game-grid');
            const term = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            
            gameList.filter(g => g.name.toLowerCase().includes(term)).forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                let displayName = g.name.replace("(TEST)", "").replace("(OG)", "").trim();
                
                if (g.name.includes("(TEST)")) {
                    card.style.borderColor = "var(--accent)";
                    card.innerHTML = `<div>${displayName}<br><span style="font-size:9px; color:var(--accent); letter-spacing:1px;">DEV BUILD</span></div>`;
                } else if (g.name.includes("(OG)")) {
                    card.innerHTML = `<div>${displayName}<br><span style="font-size:9px; opacity:0.5; letter-spacing:1px;">ORIGINAL</span></div>`;
                } else {
                    card.innerText = displayName;
                }
                
                card.onclick = () => {
                    document.getElementById('content-area').style.display = 'none';
                    document.getElementById('player-container').style.display = 'block';
                    document.getElementById('game-view').src = g.path;
                };
                grid.appendChild(card);
            });
        }

        function showTab(tab) {
            const isHome = tab === 'home';
            document.getElementById('content-area').style.display = isHome ? 'block' : 'none';
            document.getElementById('settings-area').style.display = isHome ? 'none' : 'block';
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('game-view').src = '';
            document.getElementById('nav-home').className = isHome ? 'side-btn active' : 'side-btn';
            document.getElementById('nav-settings').className = isHome ? 'side-btn' : 'side-btn active';
        }

        function runHistoryCloak() {
            const win = window.open('about:blank', '_blank');
            if (win) {
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                const iframe = win.document.createElement('iframe');
                iframe.style.width = '100%'; iframe.style.height = '100%'; iframe.style.border = 'none';
                iframe.src = window.location.href;
                win.document.body.appendChild(iframe);
                window.location.replace('https://google.com');
            }
        }

        function init() {
            // Load OG Look
            const og = localStorage.getItem('p404_og_look') === 'true';
            document.getElementById('og-toggle').checked = og;
            toggleOGLook(og);

            // Load Theme & Accent
            setTheme(localStorage.getItem('p404_theme') || 'default');
            const savedAccent = localStorage.getItem('p404_accent');
            if (savedAccent) updateAccent(savedAccent);

            // Load Cloak
            const cloak = JSON.parse(localStorage.getItem('p404_cloak')) || {name: '', icon: ''};
            document.getElementById('cloak-name').value = cloak.name;
            document.getElementById('cloak-icon').value = cloak.icon;
            applyCloak(cloak);

            renderGames();
        }

        function panic() { window.top.location.replace("https://google.com"); }
    </script>
</body>
</html>
