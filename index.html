<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">My Apps</title>
    <link id="tab-icon" rel="icon" href="https://clouddrivecdn.classlink.com/BuildingLogo/4196/1600693840734-c170760b49d09e194fb38e7922c2e2f2.png">
    
    <style>
        :root { 
            --bg: #0b0b0b; 
            --side: #121212; 
            --accent: #4CAF50; 
            --text: #efefef; 
            --card: #1e1e1e; 
            --border: #333;
            --input-bg: #000;
            --panic: #ff4444;
            --test-color: #3498db;
        }

        /* OG Terminal Look Override */
        [data-og-look="true"] {
            --bg: #000800 !important;
            --side: #000500 !important;
            --text: #00ff00 !important;
            --card: #000c00 !important;
            --border: #003300 !important;
            --accent: #00ff00 !important;
            --input-bg: #000 !important;
            font-family: 'Courier New', monospace !important;
        }

        /* Retro Scanline Effect for OG Look */
        .scanlines {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
        }
        [data-og-look="true"] .scanlines { display: block; }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --side: #ffffff;
            --accent: #000000;
            --text: #1a1a1a;
            --card: #ffffff;
            --border: #ddd;
            --input-bg: #fff;
            --panic: #cc0000;
            --test-color: #2980b9;
        }

        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            background: var(--bg); overflow: hidden; display: flex; 
            font-family: 'Segoe UI', sans-serif; color: var(--text); 
            transition: 0.2s; 
        }

        #sidebar { 
            width: 260px; background: var(--side); 
            border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; 
            padding: 15px 10px; flex-shrink: 0; height: 100%;
        }

        .side-btn { background: none; border: none; color: var(--text); opacity: 0.7; text-align: left; padding: 12px; cursor: pointer; border-radius: 8px; font-size: 14px; margin-bottom: 5px; width: 100%; transition: 0.2s; }
        .side-btn:hover, .side-btn.active { background: var(--border); opacity: 1; color: var(--accent); }
        
        h2 { font-size: 11px; color: #888; text-transform: uppercase; margin: 15px 0 8px 10px; letter-spacing: 1px; }

        #main { display: flex; flex-direction: column; flex-grow: 1; height: 100vh; position: relative; overflow: hidden; }

        #top-nav { 
            height: 60px; background: var(--side); 
            padding: 0 20px; display: flex; gap: 12px; 
            align-items: center; border-bottom: 1px solid var(--border); 
            flex-shrink: 0; 
        }

        #search { 
            flex-grow: 1; background: var(--card); 
            border: 1px solid var(--border); padding: 10px; 
            border-radius: 6px; color: var(--text); outline: none; 
        }
        
        .fs-toggle-btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; }
        .panic-btn { background: var(--panic); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        #content-area, #settings-area { flex-grow: 1; overflow-y: auto; padding: 20px; height: calc(100vh - 60px); }
        #settings-area { display: none; }

        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .game-card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 25px 10px; border-radius: 12px; cursor: pointer; 
            text-align: center; font-size: 14px; font-weight: bold; 
            min-height: 80px; display: flex; align-items: center; 
            justify-content: center; color: var(--text); transition: 0.2s; 
        }
        .game-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        #player-container { display: none; flex-grow: 1; background: black; height: calc(100vh - 60px); }
        iframe { width: 100%; height: 100%; border: none; }

        .config-box { padding: 12px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; }
        .config-input { width: 100%; padding: 8px; margin-bottom: 8px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 11px; outline: none; }
        
        .preset-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 10px; }
        .preset-btn { width: 100%; aspect-ratio: 1; border: 1px solid var(--border); background: var(--input-bg); border-radius: 6px; padding: 5px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preset-btn img { width: 24px; height: 24px; object-fit: contain; }
        .circle-icon { border-radius: 50%; }

        select { width: 100%; padding: 8px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 11px; outline: none; margin-bottom: 8px; }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body onload="init()">
    <div class="scanlines"></div>

    <div id="sidebar">
        <h1 style="color:var(--accent); margin-left:10px; font-size:22px; margin-bottom:20px;">Project 404</h1>
        <button id="nav-home" class="side-btn active" onclick="showTab('home')">Home</button>
        <button id="nav-settings" class="side-btn" onclick="showTab('settings')">Settings</button>
        
        <div style="margin-top: auto; padding: 10px;">
            <button class="side-btn" style="font-size: 12px; color: #888;" onclick="runHistoryCloak()">History Runner</button>
        </div>
    </div>

    <div id="main">
        <div id="top-nav">
            <input type="text" id="search" placeholder="Search for games..." oninput="renderGames()">
            <button id="fs-btn" class="fs-toggle-btn" onclick="toggleFullScreen()">Fullscreen</button>
            <button class="panic-btn" onclick="panic()">PANIC</button>
        </div>

        <div id="content-area">
            <div id="game-grid"></div>
        </div>

        <div id="settings-area">
            <div style="max-width: 600px; margin: 0 auto;">
                <h1 style="margin-bottom: 20px;">Settings</h1>

                <div class="config-box">
                    <h2>Tab Cloaking</h2>
                    <input type="text" id="cloak-name" class="config-input" placeholder="Custom Tab Name" oninput="saveSettings()">
                    <input type="text" id="cloak-url" class="config-input" placeholder="Icon Image URL" oninput="saveSettings()">
                    <input type="text" id="panic-url-input" class="config-input" placeholder="Panic Redirect URL" oninput="saveSettings()">
                    
                    <div class="preset-grid">
                        <div class="preset-btn" title="My Apps" onclick="setPreset('My Apps', 'https://clouddrivecdn.classlink.com/BuildingLogo/4196/1600693840734-c170760b49d09e194fb38e7922c2e2f2.png')">
                            <img src="https://clouddrivecdn.classlink.com/BuildingLogo/4196/1600693840734-c170760b49d09e194fb38e7922c2e2f2.png" class="circle-icon">
                        </div>
                        <div class="preset-btn" title="IXL" onclick="setPreset('IXL | Dashboard', 'https://www.ixl.com/dv3/71elQXS9-7sGGyJUovoUxUKfbDY/yui3/home-page/assets/home-2019/ixl-logo.svg')">
                            <img src="https://www.ixl.com/dv3/71elQXS9-7sGGyJUovoUxUKfbDY/yui3/home-page/assets/home-2019/ixl-logo.svg" class="circle-icon">
                        </div>
                        <div class="preset-btn" title="Google Docs" onclick="setPreset('Google Docs', 'https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico')">
                            <img src="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
                        </div>
                        <div class="preset-btn" title="Google Classroom" onclick="setPreset('Google Classroom', 'https://ssl.gstatic.com/classroom/favicon.png')">
                            <img src="https://ssl.gstatic.com/classroom/favicon.png">
                        </div>
                    </div>
                </div>

                <div class="config-box">
                    <h2>Appearance & Themes</h2>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-size:12px;">OG Terminal Look</span>
                        <label class="switch">
                            <input type="checkbox" id="og-toggle" onchange="toggleOGLook(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <select id="theme-select" onchange="applyThemePreset(this.value)">
                        <option value="dark">Standard Dark</option>
                        <option value="light">Standard Light</option>
                        <option value="neon">Neon Nights</option>
                        <option value="midnight">Midnight Purple</option>
                        <option value="sunset">Retro Sunset</option>
                    </select>
                    <input type="color" id="accent-picker" class="config-input" style="height:30px; cursor:pointer;" oninput="updateAccent(this.value)">
                </div>

                <div class="config-box">
                    <h2>Personal Records</h2>
                    <textarea id="records-input" class="config-input" style="height: 120px; resize: vertical;" placeholder="Slope: 500" oninput="saveRecords()"></textarea>
                </div>
            </div>
        </div>

        <div id="player-container">
            <iframe id="game-view" src="" allow="autoplay; fullscreen; keyboard" sandbox="allow-forms allow-scripts allow-same-origin allow-popups-to-escape-sandbox allow-pointer-lock"></iframe>
        </div>
    </div>

    <script>
        const gameList = [
            { name: "Bloons TD", path: "./games/bloonstd/index.html" },
            { name: "Geo Dash", path: "./games/geodash/index.html" },
            { name: "Duck Life 3", path: "./games/ducklife3/index.html" },
            { name: "Slope", path: "./games/slope/index.html" },
            { name: "2048", path: "./games/2048/index.html" },
            { name: "World's Hardest Game", path: "./games/worlds-hardest-game/index.html" },
            { name: "Flappy Bird", path: "./games/flappybird/index.html" },
            { name: "Bloons TD 2", path: "./games/bloonstd2/index.html" },
            { name: "Sand", path: "./games/Sand.html" },
            { name: "Basket Random", path: "./games/basket-random/index.html" },
            { name: "Drive Mad", path: "./games/drive-mad/index.html" },
            { name: "1v1 LOL", path: "./games/1v1lol/index.html" },
            { name: "Big Tower Tiny Square", path: "./BTTS/index.html" },
            { name: "Vex 7", path: "./games/vex7/index.html" },
            { name: "MOTOX3M POOL", path: "./games/motox3m-pool/index.html" },
            { name: "OVO", path: "./games/OVO/index.html" },
            { name: "Ball Blast", path: "./games/Ball Blast.html" },
            { name: "Dunes", path: "./games/Dune.html" },
            { name: "Appel", path: "./games/Appel v1.html" },
            { name: "Paper Minecraft", path: "./games/Paper Minecraft v11.html" },
            { name: "Square Sling", path: "./games/SS.html" },
            { name: "Dunk Shot", path: "./games/DS.html" },
            { name: "Sky Ball", path: "./games/SB.html" },
            { name: "Big Ice Tower Tiny Square", path: "./games/BITTS/BITTS.html" },
            { name: "Tag #2", path: "./games/Tag-main/index.html" },
            { name: "Cookie Clicker", path: "./CC/index.html" },
            { name: "Line Rider (TEST)", path: "./games/LR.html" },
            { name: "Space Waves (TEST)", path: "./games/cba.html" },
            { name: "Monkey Market (TEST)", path: "./games/MM.html" },
            { name: "Cut The Rope (TEST)", path: "./games/CTR.html" },
            { name: "Mario (TEST)", path: "./games/FSM/index.html" },
            { name: "Tag OG (TEST)", path: "./games/TAG/index.html" },
            { name: "Death Run 3D (TEST)", path: "./games/DR3D/index.html" },
            { name: "Big Neon Tower Tiny Square (TEST)", path: "./games/BNTTS.html" },
            { name: "Duck Life 1 (TEST)", path: "./games/DuckLife1/index.html" },
            { name: "Tube Jumpers (TEST)", path: "./games/TJ.html" }
        ];

        let typedBuffer = "";
        const panicWord = "PANIC";
        let isPanicMode = false;

        const defaults = {
            title: "My Apps",
            icon: "https://clouddrivecdn.classlink.com/BuildingLogo/4196/1600693840734-c170760b49d09e194fb38e7922c2e2f2.png",
            panic: "https://classroom.google.com"
        };

        const themePresets = {
            neon: { bg: "#000", side: "#050505", text: "#fff", card: "#0a0a0a", border: "#ff00ff", accent: "#00ffff" },
            midnight: { bg: "#050510", side: "#08081a", text: "#d1d1ff", card: "#0c0c25", border: "#1a1a4d", accent: "#7000ff" },
            sunset: { bg: "#2b102b", side: "#1a081a", text: "#ffcc33", card: "#3d1a3d", border: "#ff3366", accent: "#ff6600" }
        };

        window.onbeforeunload = function() {
            if (!isPanicMode) return "Are you sure you want to leave Project 404?";
        };

        function toggleOGLook(enabled) {
            document.body.setAttribute('data-og-look', enabled);
            localStorage.setItem('p404_og_look', enabled);
        }

        function applyThemePreset(key) {
            if (key === 'light' || key === 'dark') {
                document.body.setAttribute('data-theme', key);
                localStorage.setItem('jettTheme', key);
                return;
            }
            const t = themePresets[key];
            const r = document.documentElement.style;
            r.setProperty('--bg', t.bg); r.setProperty('--side', t.side);
            r.setProperty('--text', t.text); r.setProperty('--card', t.card);
            r.setProperty('--border', t.border); r.setProperty('--accent', t.accent);
            document.getElementById('accent-picker').value = t.accent;
            localStorage.setItem('jettTheme', key);
        }

        function updateAccent(val) {
            document.documentElement.style.setProperty('--accent', val);
            localStorage.setItem('jettAccent', val);
        }

        function showTab(tab) {
            goHome();
            const isHome = tab === 'home';
            document.getElementById('content-area').style.display = isHome ? 'block' : 'none';
            document.getElementById('settings-area').style.display = isHome ? 'none' : 'block';
            document.getElementById('nav-home').classList.toggle('active', isHome);
            document.getElementById('nav-settings').classList.toggle('active', !isHome);
        }

        function setPreset(name, icon) {
            document.getElementById('cloak-name').value = name;
            document.getElementById('cloak-url').value = icon;
            saveSettings();
        }

        function launchGame(path) {
            document.getElementById('content-area').style.display = 'none';
            document.getElementById('settings-area').style.display = 'none';
            document.getElementById('player-container').style.display = 'block';
            document.getElementById('fs-btn').style.display = 'block';
            document.getElementById('game-view').src = path;
        }

        function toggleFullScreen() {
            const player = document.getElementById('player-container');
            if (!document.fullscreenElement) player.requestFullscreen().catch(e => console.error(e));
            else document.exitFullscreen();
        }

        function goHome() {
            if (document.fullscreenElement) document.exitFullscreen();
            document.getElementById('game-view').src = '';
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('fs-btn').style.display = 'none';
            document.getElementById('content-area').style.display = 'block';
            typedBuffer = "";
        }

        function panic() { 
            isPanicMode = true;
            const saved = localStorage.getItem('jettSettings');
            const data = saved ? JSON.parse(saved) : defaults;
            window.top.location.replace(data.panic.startsWith('http') ? data.panic : 'https://' + data.panic);
        }

        document.addEventListener('keydown', (e) => { 
            typedBuffer += e.key.toUpperCase();
            if (typedBuffer.endsWith(panicWord)) panic();
            if (typedBuffer.length > 10) typedBuffer = typedBuffer.slice(-5);
        });

        function renderGames() {
            const grid = document.getElementById('game-grid');
            const term = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            gameList.filter(g => g.name.toLowerCase().includes(term)).forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                if (g.name.includes("(TEST)")) {
                    card.style.borderColor = "var(--test-color)";
                    card.innerHTML = `<div style="display:flex; flex-direction:column; gap:5px;">
                                        <span>${g.name.replace("(TEST)", "")}</span>
                                        <span style="font-size:9px; color:var(--test-color); text-transform:uppercase; letter-spacing:1px;">Development</span>
                                      </div>`;
                } else { card.innerText = g.name; }
                card.onclick = () => launchGame(g.path);
                grid.appendChild(card);
            });
        }

        function saveRecords() { localStorage.setItem('jettRecords', document.getElementById('records-input').value); }
        function loadRecords() {
            const saved = localStorage.getItem('jettRecords');
            if (saved) document.getElementById('records-input').value = saved;
        }

        function saveSettings() {
            const settings = {
                title: document.getElementById('cloak-name').value || defaults.title,
                icon: document.getElementById('cloak-url').value || defaults.icon,
                panic: document.getElementById('panic-url-input').value || defaults.panic
            };
            localStorage.setItem('jettSettings', JSON.stringify(settings));
            applySettings();
        }

        function applySettings() {
            const saved = localStorage.getItem('jettSettings');
            const data = saved ? JSON.parse(saved) : defaults;
            document.title = data.title;
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.rel = 'shortcut icon'; link.href = data.icon;
            if (!document.querySelector("link[rel*='icon']")) document.head.appendChild(link);
        }

        function init() {
            renderGames();
            applySettings();
            loadRecords();
            
            const og = localStorage.getItem('p404_og_look') === 'true';
            document.getElementById('og-toggle').checked = og;
            toggleOGLook(og);

            const savedTheme = localStorage.getItem('jettTheme') || 'dark';
            applyThemePreset(savedTheme);
            document.getElementById('theme-select').value = savedTheme;
            const savedAccent = localStorage.getItem('jettAccent');
            if(savedAccent) updateAccent(savedAccent);

            const savedSettings = localStorage.getItem('jettSettings');
            const data = savedSettings ? JSON.parse(savedSettings) : defaults;
            document.getElementById('cloak-name').value = data.title;
            document.getElementById('cloak-url').value = data.icon;
            document.getElementById('panic-url-input').value = data.panic;
            
            setInterval(applySettings, 1000);
        }

        function runHistoryCloak() {
            const url = window.location.href;
            const win = window.open('about:blank', '_blank');
            if (!win) { alert("Allow popups!"); return; }
            const doc = win.document;
            const iframe = doc.createElement('iframe');
            doc.title = document.title;
            Object.assign(iframe.style, { position: 'fixed', top: 0, bottom: 0, left: 0, right: 0, border: 'none', width: '100%', height: '100%' });
            iframe.src = url;
            doc.body.appendChild(iframe);
            isPanicMode = true;
            window.location.replace("https://google.com");
        }
    </script>
</body>
</html>
