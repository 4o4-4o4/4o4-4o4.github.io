<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Default Tab Cloak -->
    <title id="tab-title">Google Docs</title>
    <link id="tab-icon" rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    
    <style>
        :root { --bg: #0b0b0b; --side: #121212; --accent: #4CAF50; --text: #efefef; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 240px; background: var(--side); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-btn { background: none; border: none; color: #aaa; text-align: left; padding: 12px; cursor: pointer; border-radius: 8px; font-size: 14px; transition: 0.2s; margin-bottom: 2px; }
        .cat-btn:hover, .cat-btn.active { background: #222; color: var(--accent); }
        h2 { font-size: 11px; color: #555; text-transform: uppercase; margin: 20px 0 10px 10px; letter-spacing: 1px; }

        /* Main Content */
        #main { flex-grow: 1; display: flex; flex-direction: column; }
        
        /* Top Navigation Bar */
        #top-nav { background: #121212; padding: 10px 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #222; flex-wrap: wrap; }
        .cloak-btn { padding: 6px 10px; border: 1px solid #333; background: #1a1a1a; color: #888; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .cloak-btn:hover { border-color: var(--accent); color: white; }
        
        #search { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; padding: 8px; border-radius: 6px; color: white; outline: none; min-width: 150px; }
        .panic-btn { background: #b71c1c; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Mirror Bar */
        #mirror-bar { background: #1a1a1a; padding: 10px 20px; display: none; gap: 10px; align-items: center; border-bottom: 1px solid #333; }
        .mirror-btn { background: #333; border: 1px solid #444; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .mirror-btn.active { background: var(--accent); border-color: white; }

        /* Content Area */
        #content-area { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #instructions { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; color: #888; }
        
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .game-card { background: var(--card); border: 1px solid #333; padding: 15px 5px; border-radius: 10px; cursor: pointer; text-align: center; font-size: 13px; transition: 0.2s; }
        .game-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        /* Player */
        #player-container { flex-grow: 1; background: black; display: none; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        #close-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer; border-radius: 5px; z-index: 10; }
    </style>
</head>
<body onload="init()">

    <div id="sidebar">
        <h1 style="color:var(--accent); margin-left:10px; font-size:20px;">Project Hub</h1>
        <button class="cat-btn active" onclick="filterCat('All')">🏠 Home / All</button>
        
        <h2>Modules</h2>
        <button class="cat-btn" onclick="filterCat('Parkour')">🏃 Vex & Parkour</button>
        <button class="cat-btn" onclick="filterCat('Duck')">🦆 Duck Life</button>
        <button class="cat-btn" onclick="filterCat('Clicker')">🖱️ Clickers</button>
        <button class="cat-btn" onclick="filterCat('Racing')">🚦 Drift & Speed</button>
        <button class="cat-btn" onclick="filterCat('Other')">📦 Other</button>
    </div>

    <div id="main">
        <!-- TOP NAV: CLOAK SWITCHER & PANIC -->
        <div id="top-nav">
            <span style="font-size:11px; color:#555;">TAB CLOAK:</span>
            <button class="cloak-btn" onclick="setCloak('docs')">Docs</button>
            <button class="cloak-btn" onclick="setCloak('classroom')">Classroom</button>
            <button class="cloak-btn" onclick="setCloak('slides')">Slides</button>
            <button class="cloak-btn" onclick="setCloak('classlink')">ClassLink</button>
            
            <input type="text" id="search" placeholder="Search modules..." oninput="search()">
            
            <button class="panic-btn" onclick="panic()">PANIC (ESC)</button>
        </div>

        <div id="mirror-bar">
            <span style="font-size:12px; color:#888;">Switch Mirror:</span>
            <div id="mirror-btns" style="display:flex; gap:5px;"></div>
        </div>

        <div id="content-area">
            <div id="instructions">
                <b>User Portal:</b> Use the top buttons to change the tab appearance. Press <b>ESC</b> to instantly go to Google Classroom. 
                If a game is 404, please try another mirror.
            </div>
            <div id="game-grid"></div>
        </div>

        <div id="player-container">
            <button id="close-btn" onclick="closeGame()">Close [X]</button>
            <iframe id="game-view" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock" src=""></iframe>
        </div>
    </div>

    <script>
        // TAB CLOAK LOGIC
        const cloaks = {
            docs: { t: "Google Docs", i: "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico" },
            classroom: { t: "Classes", i: "https://ssl.gstatic.com/classroom/favicon.png" },
            slides: { t: "Google Slides", i: "https://ssl.gstatic.com/docs/presentations/images/favicon5.ico" },
            classlink: { t: "Login", i: "https://www.classlink.com/favicon.ico" }
        };

        function setCloak(type) {
            localStorage.setItem('cloak', type);
            applyCloak();
        }

        function applyCloak() {
            let type = localStorage.getItem('cloak') || 'docs';
            document.title = cloaks[type].t;
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon';
            link.rel = 'shortcut icon';
            link.href = cloaks[type].i;
            document.getElementsByTagName('head')[0].appendChild(link);
        }
        setInterval(applyCloak, 100);

        function panic() { window.location.replace("https://classroom.google.com"); }
        document.addEventListener('keydown', (e) => { if(e.key === "Escape") panic(); });

        // GAME DATABASE
        // Change these URLs to match the folders you upload!
        const games = [
            { n: "Vex 3", c: "Parkour", m: ["./vex3/index.html", "https://6xbook.github.io/vex3/index.html"] },
            { n: "Vex 8", c: "Parkour", m: ["./vex8/index.html", "https://777-games.github.io/vex-8/"] },
            { n: "Duck Life 4", c: "Duck", m: ["./ducklife4/index.html", "https://6xbook.github.io/duck-life-4/index.html"] },
            { n: "Monkey Clicker", c: "Clicker", m: ["./monkey-clicker/index.html", "https://mathadventure1.github.io/banana-clicker/index.html"] },
            { n: "Cookie Clicker", c: "Clicker", m: ["./cookie-clicker/index.html", "https://ozh.github.io/cookieclicker/"] },
            { n: "Drift Boss", c: "Racing", m: ["./drift-boss/index.html", "https://drifthunters.github.io/drift-boss/"] }
        ];

        function init() { filterCat('All'); }

        function filterCat(c) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            const list = c === 'All' ? games : games.filter(g => g.c === c);
            list.forEach(g => {
                let d = document.createElement('div');
                d.className = 'game-card';
                d.innerText = g.n;
                d.onclick = () => selectGame(g);
                grid.appendChild(d);
            });
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(c)));
            document.getElementById('instructions').style.display = (c === 'All') ? 'block' : 'none';
        }

        function selectGame(g) {
            document.getElementById('content-area').style.display = 'none';
            document.getElementById('player-container').style.display = 'block';
            document.getElementById('mirror-bar').style.display = 'flex';
            const mContainer = document.getElementById('mirror-btns');
            mContainer.innerHTML = '';
            g.m.forEach((url, index) => {
                let b = document.createElement('button');
                b.className = 'mirror-btn';
                b.innerText = `Mirror ${index + 1}`;
                b.onclick = () => {
                    document.getElementById('game-view').src = url;
                    document.querySelectorAll('.mirror-btn').forEach(btn => btn.classList.remove('active'));
                    b.classList.add('active');
                };
                mContainer.appendChild(b);
                if(index === 0) b.click();
            });
        }

        function closeGame() {
            document.getElementById('game-view').src = '';
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('mirror-bar').style.display = 'none';
            document.getElementById('content-area').style.display = 'block';
        }

        function search() {
            let t = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            games.filter(g => g.n.toLowerCase().includes(t)).forEach(g => {
                let d = document.createElement('div');
                d.className = 'game-card';
                d.innerText = g.n;
                d.onclick = () => selectGame(g);
                grid.appendChild(d);
            });
        }
    </script>
</body>
</html>
