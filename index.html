<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Page not found · GitHub Pages</title>
    <link id="tab-icon" rel="icon" href="https://github.githubassets.com/favicons/favicon.svg">
    
    <style>
        :root { 
            --bg: #0b0b0b; --side: #121212; --text: #efefef; 
            --card: rgba(30, 30, 30, 0.9); --border: #333; --accent: #3498db;
            --glow: rgba(52, 152, 219, 0.4);
        }

        /* --- THE 25 STYLES --- */
        [data-look="1"] { --bg: #000800; --side: #000500; --text: #00ff00; --card: rgba(0, 15, 0, 0.9); --border: #004400; --accent: #00ff00; }
        [data-look="2"] { --bg: #0a0000; --side: #150000; --text: #ff4d4d; --card: rgba(35, 0, 0, 0.9); --border: #550000; --accent: #ff0000; }
        [data-look="3"] { --bg: #000b1a; --side: #00122e; --text: #00fff2; --card: rgba(0, 20, 50, 0.9); --border: #00fff2; --accent: #f0f; }
        [data-look="4"] { --bg: #ffffff; --side: #f0f0f0; --text: #111; --card: rgba(220, 220, 220, 0.9); --border: #bbb; --accent: #3498db; }
        [data-look="5"] { --bg: #1a0026; --side: #11001a; --text: #e600ff; --card: rgba(40, 0, 60, 0.9); --border: #e600ff; --accent: #e600ff; }
        [data-look="6"] { --bg: #001a0d; --side: #000d06; --text: #00ff80; --card: rgba(0, 40, 20, 0.9); --border: #00ff80; --accent: #00ff80; }
        [data-look="7"] { --bg: #1a0f00; --side: #0d0800; --text: #ff9900; --card: rgba(40, 25, 0, 0.9); --border: #ff9900; --accent: #ff9900; }
        [data-look="8"] { --bg: #00141a; --side: #000a0d; --text: #00d9ff; --card: rgba(0, 30, 40, 0.9); --border: #00d9ff; --accent: #00d9ff; }
        [data-look="9"] { --bg: #1a0000; --side: #0d0000; --text: #ff0000; --card: rgba(50, 0, 0, 0.9); --border: #ff0000; --accent: #ff0000; }
        [data-look="10"] { --bg: #0d0d0d; --side: #000; --text: #fff; --card: rgba(30, 30, 30, 0.9); --border: #fff; --accent: #fff; }
        [data-look="11"] { --bg: #1a1a00; --side: #0d0d00; --text: #ffff00; --card: rgba(40, 40, 0, 0.9); --border: #ffff00; --accent: #ffff00; }
        [data-look="12"] { --bg: #0a0a1a; --side: #05050d; --text: #5c5cff; --card: rgba(15, 15, 45, 0.9); --border: #5c5cff; --accent: #5c5cff; }
        [data-look="13"] { --bg: #1a000d; --side: #0d0006; --text: #ff0080; --card: rgba(40, 0, 20, 0.9); --border: #ff0080; --accent: #ff0080; }
        [data-look="14"] { --bg: #001a1a; --side: #000d0d; --text: #00ffff; --card: rgba(0, 40, 40, 0.9); --border: #00ffff; --accent: #00ffff; }
        [data-look="15"] { --bg: #0d1a00; --side: #060d00; --text: #80ff00; --card: rgba(20, 40, 0, 0.9); --border: #80ff00; --accent: #80ff00; }
        [data-look="16"] { --bg: #1a0d00; --side: #0d0600; --text: #ff8000; --card: rgba(40, 20, 0, 0.9); --border: #ff8000; --accent: #ff8000; }
        [data-look="17"] { --bg: #000d1a; --side: #00060d; --text: #0080ff; --card: rgba(0, 20, 40, 0.9); --border: #0080ff; --accent: #0080ff; }
        [data-look="18"] { --bg: #0d001a; --side: #06000d; --text: #8000ff; --card: rgba(20, 0, 40, 0.9); --border: #8000ff; --accent: #8000ff; }
        [data-look="19"] { --bg: #1a001a; --side: #0d000d; --text: #ff00ff; --card: rgba(40, 0, 40, 0.9); --border: #ff00ff; --accent: #ff00ff; }
        [data-look="20"] { --bg: #001a00; --side: #000d00; --text: #00ff00; --card: rgba(0, 40, 0, 0.9); --border: #00ff00; --accent: #00ff00; }
        [data-look="21"] { --bg: #222; --side: #111; --text: #888; --card: rgba(40, 40, 40, 0.9); --border: #444; --accent: #666; }
        [data-look="22"] { --bg: #050505; --side: #000; --text: #bb86fc; --card: rgba(20, 20, 20, 0.9); --border: #bb86fc; --accent: #bb86fc; }
        [data-look="23"] { --bg: #050505; --side: #000; --text: #03dac6; --card: rgba(20, 20, 20, 0.9); --border: #03dac6; --accent: #03dac6; }
        [data-look="24"] { --bg: #002b36; --side: #073642; --text: #839496; --card: rgba(0, 43, 54, 0.9); --border: #93a1a1; --accent: #268bd2; }
        [data-look="25"] { --bg: #282c34; --side: #21252b; --text: #abb2bf; --card: rgba(44, 49, 58, 0.9); --border: #61afef; --accent: #c678dd; }

        * { cursor: none !important; box-sizing: border-box; outline: none; transition: 0.2s; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg); overflow: hidden; display: flex; font-family: 'Segoe UI', sans-serif; color: var(--text); }
        
        #trail-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .game-card, .side-btn, h2, h3, p, input { text-shadow: 2px 2px 4px rgba(0,0,0,1); }

        #gatekeeper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f9f9f9; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 15px; flex-shrink: 0; }
        .side-btn { background: none; border: 1px solid transparent; color: var(--text); opacity: 0.8; text-align: left; padding: 12px 15px; border-radius: 8px; font-size: 14px; margin-bottom: 5px; }
        .side-btn.active, .side-btn:hover { background: var(--border); opacity: 1; color: var(--accent); border-left: 4px solid var(--accent); }

        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #top-nav { height: 60px; background: var(--side); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid var(--border); }
        #search { flex-grow: 1; background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: var(--text); }
        
        #content-area, #records-area, #settings-area { flex-grow: 1; overflow-y: auto; padding: 30px; display: none; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border: 1px solid var(--border); padding: 45px 10px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }

        #launcher { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #game-frame { width: 100%; height: 100%; border: none; }
        #close-launcher { position: absolute; top: 20px; right: 20px; background: #ff4444; color: white; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; z-index: 5001; }
        
        .config-box { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cloak-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body onload="init()">
    <canvas id="trail-canvas"></canvas>
    <div id="gatekeeper"><img src="abcabc.png" alt="Decoy"></div>

    <div id="launcher">
        <button id="close-launcher" onclick="closeGame()">EXIT HOME</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <div id="sidebar">
        <h2 style="margin-left:10px; color:var(--accent); font-size: 28px;">404</h2>
        <button id="nav-home" class="side-btn active" onclick="showTab('home')">Home</button>
        <button id="nav-records" class="side-btn" onclick="showTab('records')">Records</button>
        <button id="nav-settings" class="side-btn" onclick="showTab('settings')">Settings</button>
    </div>

    <div id="main">
        <div id="top-nav">
            <input type="text" id="search" placeholder="Search Home..." oninput="renderGames()">
            <button class="side-btn" style="background:#cc0000; color:white; opacity:1;" onclick="panic()">PANIC</button>
        </div>
        <div id="content-area" style="display: block;"><div id="game-grid"></div></div>
        <div id="records-area"><textarea id="records-text" oninput="saveRecords()" style="width:100%; height:450px; background:rgba(0,0,0,0.3); color:var(--text); padding:20px; border:none; resize:none;"></textarea></div>
        <div id="settings-area">
            <div class="config-box">
                <h2>Quick Cloaks (Shift + 1-6)</h2>
                <div class="cloak-grid">
                    <button class="side-btn" onclick="setPreset('My Apps', 'https://filescdn.classlink.com/resources/customlinks/1601307234673-fbb20dacacaf8359984dc1276e57ddc6.png')">[1] My Apps</button>
                    <button class="side-btn" onclick="setPreset('Home', 'https://ssl.gstatic.com/classroom/favicon.png')">[2] Classroom</button>
                    <button class="side-btn" onclick="setPreset('IXL | Dashboard', 'https://www.ixl.com/favicon.ico')">[3] IXL</button>
                    <button class="side-btn" onclick="setPreset('Google Docs', 'google-docs.png')">[4] Docs</button>
                    <button class="side-btn" onclick="setPreset('Google Slides', 'slides.png')">[5] Slides</button>
                    <button class="side-btn" onclick="setPreset('New Tab', 'https://www.sdflsafdjljsfdjfalm.com/favicon.icodfsf')">[6] New Tab</button>
                </div>
            </div>
            <div class="config-box"><h2>Styles (Shift + Esc to Cycle)</h2><p>Use hotkeys to cycle through 25 themes instantly.</p></div>
        </div>
    </div>

    <script>
        const combo = "404"; let inputSeq = ""; 
        const canvas = document.getElementById('trail-canvas'); const ctx = canvas.getContext('2d'); 
        let points = []; let ripple = {x:0, y:0, r:0, a:0};
        let currentLook = 0;

        const games = [
            {n: "Bloons TD", p: "./games/bloonstd/index.html", dev: true},
            {n: "Geo Dash", p: "./games/geodash/index.html", dev: false},
            {n: "Duck Life 3", p: "./games/ducklife3/index.html", dev: false},
            {n: "Slope", p: "./games/slope/index.html", dev: true},
            {n: "2048", p: "./games/2048/index.html", dev: false},
            {n: "World's Hardest Game", p: "./games/worlds-hardest-game/index.html", dev: true},
            {n: "Flappy Bird", p: "./games/flappybird/index.html", dev: false},
            {n: "Sand", p: "./games/Sand.html", dev: false},
            {n: "Basket Random", p: "./games/basket-random/index.html", dev: false},
            {n: "Drive Mad", p: "./games/drive-mad/index.html", dev: false},
            {n: "1v1 LOL", p: "./games/1v1lol/index.html", dev: true},
            {n: "BTTS", p: "./BTTS/index.html", dev: false},
            {n: "Vex 7", p: "./games/vex7/index.html", dev: false},
            {n: "MOTOX3M POOL", p: "./games/motox3m-pool/index.html", dev: false},
            {n: "OVO", p: "./games/OVO/index.html", dev: false},
            {n: "Ball Blast", p: "./games/Ball Blast.html", dev: false},
            {n: "Dunes", p: "./games/Dune.html", dev: false},
            {n: "Appel", p: "./games/Appel v1.html", dev: false},
            {n: "Paper Minecraft", p: "./games/Paper Minecraft v11.html", dev: true},
            {n: "Square Sling", p: "./games/SS.html", dev: false},
            {n: "Dunk Shot", p: "./games/DS.html", dev: false},
            {n: "Sky Ball", p: "./games/SB.html", dev: false},
            {n: "BITTS", p: "./games/BITTS/BITTS.html", dev: false},
            {n: "Tag #2", p: "./games/Tag-main/index.html", dev: false},
            {n: "Cookie Clicker", p: "./CC/index.html", dev: false},
            {n: "Tube Jumpers", p: "./games/TJ.html", dev: false}
        ];

        window.onkeydown = e => {
            if (document.getElementById('gatekeeper').style.display !== 'none') {
                inputSeq += e.key;
                if (inputSeq.endsWith(combo)) document.getElementById('gatekeeper').style.display = 'none';
                return;
            }
            // HOTKEYS
            if (e.shiftKey) {
                if(e.key === "1") setPreset('My Apps', 'https://filescdn.classlink.com/resources/customlinks/1601307234673-fbb20dacacaf8359984dc1276e57ddc6.png');
                if(e.key === "2") setPreset('Home', 'https://ssl.gstatic.com/classroom/favicon.png');
                if(e.key === "3") setPreset('IXL | Dashboard', 'https://www.ixl.com/favicon.ico');
                if(e.key === "4") setPreset('Google Docs', 'https://ssl.gstatic.com/docs/documents/images/favicon_v3.ico');
                if(e.key === "5") setPreset('Google Slides', 'SLIDES.png');
                if(e.key === "6") setPreset('Google', 'https://www.google.com/favicon.ico');
                if(e.key === "Escape") { currentLook = (currentLook % 25) + 1; setLook(currentLook); }
            }
        };

        function launchGame(url) { document.getElementById('launcher').style.display = 'block'; document.getElementById('game-frame').src = url; }
        function closeGame() { document.getElementById('launcher').style.display = 'none'; document.getElementById('game-frame').src = ""; }
        function setLook(v) { document.body.setAttribute('data-look', v); localStorage.setItem('p404_look', v); }
        function setPreset(t, i) { document.title = t; document.getElementById('tab-icon').href = i; localStorage.setItem('p404_t', t); localStorage.setItem('p404_i', i); }

        function renderGames() {
            const grid = document.getElementById('game-grid'); const term = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            games.filter(g => g.n.toLowerCase().includes(term)).forEach(g => {
                const card = document.createElement('div'); card.className = `game-card ${g.dev ? 'dev-outline' : ''}`;
                card.innerText = g.n; card.onclick = () => launchGame(g.p); grid.appendChild(card);
            });
        }

        function showTab(t) {
            ['content', 'settings', 'records'].forEach(id => document.getElementById(id + '-area').style.display = 'none');
            document.getElementById(`${t === 'home' ? 'content' : t}-area`).style.display = 'block';
        }

        window.onmousemove = e => { points.push({ x: e.clientX, y: e.clientY, age: 0 }); };
        window.onclick = e => { ripple = {x: e.clientX, y: e.clientY, r: 0, a: 1}; };

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const acc = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            if(points.length > 0) {
                const h = points[points.length-1]; ctx.fillStyle = acc; ctx.beginPath(); ctx.arc(h.x, h.y, 5, 0, 7); ctx.fill();
            }
            ctx.strokeStyle = acc; ctx.lineWidth = 3; ctx.beginPath();
            points.forEach((p, i) => { p.age++; if(i==0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
            ctx.stroke(); points = points.filter(p => p.age < 20);
            if(ripple.a > 0) {
                ctx.strokeStyle = acc; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(ripple.x, ripple.y, ripple.r+=4, 0, 7); ctx.stroke(); ripple.a -= 0.02;
            }
            requestAnimationFrame(animate);
        }

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            renderGames(); animate();
            const l = localStorage.getItem('p404_look') || '1'; setLook(l);
            const t = localStorage.getItem('p404_t'); const i = localStorage.getItem('p404_i');
            if(t) document.title = t; if(i) document.getElementById('tab-icon').href = i;
        }
    </script>
</body>
</html>
