<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Google Docs</title>
    <link id="tab-icon" rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    
    <style>
        :root { --bg: #0b0b0b; --side: #121212; --accent: #4CAF50; --text: #efefef; --card: #1e1e1e; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; display: flex; }
        body { font-family: 'Segoe UI', sans-serif; color: var(--text); }

        /* Sidebar */
        #sidebar { width: 260px; background: var(--side); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 15px 10px; flex-shrink: 0; overflow-y: auto; }
        .side-btn { background: none; border: none; color: #aaa; text-align: left; padding: 12px; cursor: pointer; border-radius: 8px; font-size: 14px; transition: 0.2s; margin-bottom: 5px; width: 100%; }
        .side-btn:hover, .side-btn.active { background: #222; color: var(--accent); }
        h2 { font-size: 11px; color: #555; text-transform: uppercase; margin: 15px 0 8px 10px; letter-spacing: 1px; }

        /* Settings & Records */
        .config-box { padding: 12px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        .config-input { width: 100%; padding: 8px; margin-bottom: 8px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; font-size: 11px; outline: none; }
        .config-save-btn { width: 100%; padding: 8px; background: var(--accent); border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* Main Content */
        #main { display: flex; flex-direction: column; flex-grow: 1; height: 100vh; position: relative; }
        #top-nav { height: 60px; background: #121212; padding: 0 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        #search { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 6px; color: white; outline: none; }
        
        /* Utility Buttons */
        .util-btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .util-btn:hover { background: #444; }
        .panic-btn { background: #b71c1c; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Grid Area */
        #content-area { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .game-card { background: var(--card); border: 1px solid #333; padding: 25px 10px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 14px; transition: 0.3s; font-weight: bold; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .game-card:hover { border-color: var(--accent); transform: translateY(-3px); background: #252525; }

        /* Player */
        #player-container { display: none; flex-grow: 1; background: black; width: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body onload="init()">

    <div id="sidebar">
        <h1 style="color:var(--accent); margin-left:10px; font-size:22px; margin-bottom:20px;">404</h1>
        <button id="home-btn" class="side-btn active" onclick="goHome()">Home</button>
        
        <div class="config-box">
            <h2>Personal Records</h2>
            <textarea id="records-input" class="config-input" style="height: 60px; resize: none;" placeholder="Slope: 500&#10;Drift: 1200"></textarea>
            <button class="config-save-btn" style="background:#2196F3;" onclick="saveRecords()">Save Records</button>
        </div>

        <div class="config-box">
            <h2>Tab Settings</h2>
            <input type="text" id="cloak-name" class="config-input" placeholder="Custom Tab Name">
            <input type="text" id="cloak-url" class="config-input" placeholder="Website URL for Icon">
            <input type="text" id="panic-url-input" class="config-input" placeholder="Panic Link (ESC)">
            <button class="config-save-btn" onclick="saveSettings()">Apply Settings</button>
        </div>
    </div>

    <div id="main">
        <div id="top-nav">
            <input type="text" id="search" placeholder="Search for games..." oninput="renderGames()">
            
            <!-- FULLSCREEN BUTTON -->
            <button class="util-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
            
            <button class="panic-btn" onclick="panic()">PANIC (ESC)</button>
        </div>

        <div id="content-area">
            <div id="game-grid"></div>
        </div>

        <div id="player-container">
            <iframe id="game-view" src="" allow="autoplay; fullscreen; keyboard"></iframe>
        </div>
    </div>

    <script>
        const gameList = [
            { name: "Bloons TD", path: "./bloonstd/index.html" },
            { name: "Geo Dash", path: "./geodash/index.html" },
            { name: "Duck Life 3", path: "./games/ducklife3/index.html" },
            { name: "Drift Boss", path: "./games/drift-boss/index.html" },
            { name: "Slope", path: "./games/slope/index.html" },
            { name: "2048", path: "./games/2048/index.html" },
            { name: "World's Hardest Game", path: "./worlds-hardest-game/index.html" },
            { name: "Flappy Bird", path: "./games/flappybird/index.html" },
            { name: "Bloons TD 2", path: "./bloonstd2/index.html" },
            { name: "Sand", path: "./games/Sand.html" },
            { name: "Basket Random", path: "./games/basket-random/index.html" },
            { name: "Drive Mad", path: "./games/drive-mad/index.html" },
            { name: "1v1 LOL", path: "./games/1v1lol/index.html" },
            { name: "Big Tower Tiny Square", path: "./BTTS/index.html" },
            { name: "Dunes", path: "./games/Dune.html" },
            { name: "Cookie Clicker", path: "./CC/index.html" }
        ];

        // --- FULLSCREEN LOGIC ---
        function toggleFullscreen() {
            const player = document.getElementById('player-container');
            if (player.style.display === 'none') {
                alert("Please open a game first to go fullscreen!");
                return;
            }

            if (!document.fullscreenElement) {
                player.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // --- RECORDS LOGIC ---
        function saveRecords() {
            localStorage.setItem('jettRecords', document.getElementById('records-input').value);
        }
        function loadRecords() {
            const saved = localStorage.getItem('jettRecords');
            if (saved) document.getElementById('records-input').value = saved;
        }

        // --- SETTINGS LOGIC ---
        function saveSettings() {
            const iconUrl = document.getElementById('cloak-url').value;
            let finalIcon = "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico";
            if (iconUrl) {
                try {
                    const url = new URL(iconUrl.startsWith('http') ? iconUrl : 'https://' + iconUrl);
                    finalIcon = `https://www.google.com/s2/favicons?domain=${url.hostname}&sz=64`;
                } catch(e) {}
            }
            const settings = {
                title: document.getElementById('cloak-name').value || "Google Docs",
                icon: finalIcon,
                panic: document.getElementById('panic-url-input').value || "https://classroom.google.com"
            };
            localStorage.setItem('jettSettings', JSON.stringify(settings));
            applySettings();
        }

        function applySettings() {
            const saved = localStorage.getItem('jettSettings');
            const data = saved ? JSON.parse(saved) : { title: "Google Docs", icon: "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico", panic: "https://classroom.google.com" };
            document.title = data.title;
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon'; link.rel = 'shortcut icon'; link.href = data.icon;
            if (!document.querySelector("link[rel*='icon']")) document.head.appendChild(link);
            window.activePanicURL = data.panic;
        }

        // --- SYSTEM ENGINE ---
        function init() {
            renderGames();
            applySettings();
            loadRecords();
            setInterval(applySettings, 1000);
        }

        function goHome() {
            document.getElementById('game-view').src = '';
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('content-area').style.display = 'block';
            if (document.fullscreenElement) document.exitFullscreen();
            renderGames();
        }

        function renderGames() {
            const grid = document.getElementById('game-grid');
            const term = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            gameList.filter(g => g.name.toLowerCase().includes(term)).forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerText = g.name;
                card.onclick = () => {
                    document.getElementById('content-area').style.display = 'none';
                    document.getElementById('player-container').style.display = 'block';
                    document.getElementById('game-view').src = g.path;
                };
                grid.appendChild(card);
            });
        }

        function panic() { window.location.replace(window.activePanicURL || "https://classroom.google.com"); }
        document.addEventListener('keydown', (e) => { if (e.key === "Escape") panic(); });
    </script>
</body>
</html>
